<!DOCTYPE html>
<html lang="id" class="w-full h-full m-0 p-0 overflow-hidden select-none touch-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Digital Photobooth</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/face-api.min.js" defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght=400;700&family=Montserrat:wght=300;400;600&display=swap');
        body { 
            background-color: #0A0A0A; 
            font-family: 'Montserrat', sans-serif; 
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .font-wedding { font-family: 'Cinzel', serif; }
        .page-hidden { display: none !important; }
        .mirror-view { transform: scaleX(-1); }
        .filter-beauty { filter: contrast(104%) brightness(106%) saturate(103%); }
        .filter-bw { filter: grayscale(100%) contrast(120%); }
        .filter-sepia { filter: sepia(70%) contrast(95%) brightness(100%); }
        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="w-full h-full m-0 p-0 overflow-hidden flex justify-center items-center">

    <div id="flash-overlay" class="fixed inset-0 bg-white opacity-0 pointer-events-none z-[9999] transition-opacity duration-75"></div>

    <div class="w-full h-full bg-[#0A0A0A] relative overflow-hidden flex flex-col justify-between text-white p-6 pt-10">
        
        <div id="page-registrasi" class="flex flex-col justify-between h-full w-full relative z-10">
            <div class="my-auto space-y-6 max-w-md mx-auto w-full">
                <div class="space-y-2 text-center mb-8">
                    <h2 class="text-xs tracking-[0.3em] text-[#E2C799] font-semibold">WELCOME TO THE WEDDING OF</h2>
                    <h1 class="text-3xl font-wedding tracking-widest text-[#E2C799] font-bold">Andi & Zaza</h1>
                </div>
                
                <div class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] tracking-wider text-gray-400 font-medium">Wajib nama lengkap</label>
                        <input type="text" id="input-nama" placeholder="Nama Lengkap..." class="w-full bg-[#F3DEBA]/20 border border-transparent rounded-xl px-4 py-3.5 text-sm text-white placeholder-gray-400 focus:outline-none focus:border-[#E2C799]/50 transition">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] tracking-wider text-gray-400 font-medium">Wajib email aktif</label>
                        <input type="email" id="input-email" placeholder="Alamat Email..." class="w-full bg-[#F3DEBA]/20 border border-transparent rounded-xl px-4 py-3.5 text-sm text-white placeholder-gray-400 focus:outline-none focus:border-[#E2C799]/50 transition">
                    </div>
                </div>

                <div class="pt-4">
                    <button onclick="simpanRegistrasiDanLanjut()" class="w-full bg-[#8c6239] hover:bg-[#734d2a] text-white py-3.5 rounded-xl font-bold text-xs tracking-[0.2em] transition shadow-lg active:scale-[0.98]">
                        SELANJUTNYA
                    </button>
                </div>
            </div>
        </div>

        <div id="page-sesi-potret" class="page-hidden flex flex-col justify-between h-full w-full relative z-10">
            <div class="flex justify-between items-center px-4 py-2 bg-zinc-900/50 rounded-2xl backdrop-blur-sm z-30">
                <button onclick="toggleKamera()" class="flex flex-col items-center gap-1 text-[10px] font-medium tracking-widest text-gray-400 hover:text-white transition active:scale-95">
                    <i data-lucide="refresh-cw" class="w-4 h-4 text-[#E2C799]"></i>
                    <span id="text-kamera">FRONT</span>
                </button>
                <button onclick="toggleFlash()" class="flex flex-col items-center gap-1 text-[10px] font-medium tracking-widest text-gray-400 hover:text-white transition active:scale-95">
                    <i data-lucide="zap" id="icon-flash" class="w-4 h-4 text-[#E2C799]"></i>
                    <span id="text-flash">AUTO</span>
                </button>
                <button onclick="toggleFilter()" class="flex flex-col items-center gap-1 text-[10px] font-medium tracking-widest text-gray-400 hover:text-white transition active:scale-95">
                    <i data-lucide="aperture" class="w-4 h-4 text-[#E2C799]"></i>
                    <span id="text-filter">BEAUTY</span>
                </button>
            </div>

            <div class="w-full aspect-[3/4] my-auto rounded-[32px] overflow-hidden bg-zinc-900 relative border border-white/5 shadow-2xl flex items-center justify-center">
                <video id="video-potret" class="w-full h-full object-cover mirror-view filter-beauty" autoplay muted playsinline></video>
                <div class="absolute bottom-6 left-6 bg-black/70 backdrop-blur-md px-3 py-1.5 rounded-full text-[11px] font-semibold tracking-wide border border-white/10 flex items-center gap-1.5 z-40">
                    <span>📷 Frame:</span>
                    <span id="jumlah-potret" class="text-[#E2C799] font-bold">0/20</span>
                </div>
            </div>

            <div class="flex justify-between items-center px-6 pb-6 z-30">
                <button onclick="pindahHalaman('sesi-potret', 'gallery')" class="w-14 h-14 rounded-2xl bg-zinc-900 border border-white/10 flex items-center justify-center active:scale-95 transition text-gray-400 hover:text-white">
                    <i data-lucide="image" class="w-6 h-6"></i>
                </button>
                <button onclick="prosesAmbilFoto()" class="w-20 h-20 bg-white rounded-full p-1.5 border-4 border-zinc-700 active:scale-90 transform transition duration-100 flex items-center justify-center">
                    <div class="w-full h-full bg-white rounded-full border-2 border-zinc-200"></div>
                </button>
                <div id="upload-indicator" class="w-14 h-14 flex items-center justify-center text-xs">
                    <i data-lucide="check-circle" class="w-7 h-7 text-green-400 hidden"></i>
                    <i data-lucide="loader-2" class="w-7 h-7 text-[#E2C799] animate-spin hidden"></i>
                </div>
            </div>
        </div>

        <div id="page-faceid-scan" class="page-hidden flex flex-col justify-between h-full w-full z-10 text-center">
            <div class="my-auto space-y-6 max-w-sm mx-auto w-full flex flex-col items-center">
                <div class="w-48 aspect-square rounded-[32px] border-2 border-[#E2C799] p-3 flex items-center justify-center bg-zinc-900/50 relative overflow-hidden">
                    <div class="w-full h-full rounded-2xl border border-dashed border-[#E2C799]/40 bg-black/40 flex items-center justify-center">
                        <i data-lucide="scan-face" class="w-16 h-16 text-[#E2C799]/70 animate-pulse"></i>
                    </div>
                </div>
                <div class="space-y-1">
                    <h2 class="text-lg font-bold tracking-widest text-white">SCAN FACE ID</h2>
                    <p id="status-ai" class="text-xs text-amber-400/80 font-medium">Memuat model AI...</p>
                </div>
                <button onclick="jalankanScanWajah()" class="w-full bg-zinc-800 border border-white/10 hover:bg-zinc-700 text-white py-3.5 rounded-xl font-bold text-xs tracking-widest transition active:scale-[0.98]">
                    START SCANNING
                </button>
            </div>
        </div>

        <div id="page-gallery" class="page-hidden flex flex-col justify-between h-full w-full z-10">
            <div class="flex justify-between items-start pt-2 pb-4">
                <div class="flex flex-col gap-2">
                    <h1 class="text-2xl font-black tracking-wider text-white">RESULT!</h1>
                    <button onclick="pindahHalaman('gallery', 'faceid-scan')" class="px-3 py-1 bg-zinc-900 border border-[#E2C799]/30 text-[#E2C799] text-[10px] font-bold rounded-lg flex items-center gap-1 active:scale-95 transition">
                        <i data-lucide="scan-face" class="w-3.5 h-3.5"></i> RE-SCAN FACE
                    </button>
                </div>
                <div class="text-right">
                    <p class="text-base font-wedding tracking-widest text-[#E2C799] font-bold leading-tight">Andi</p>
                    <p class="text-[10px] font-wedding text-[#E2C799]/70 my-0.5">&</p>
                    <p class="text-base font-wedding tracking-widest text-[#E2C799] font-bold leading-tight">Zaza</p>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto my-2 pr-1 custom-scroll">
                <div id="gallery-grid" class="grid grid-cols-3 gap-2.5 auto-rows-max w-full"></div>
            </div>
            
            <div class="flex justify-between items-center border-t border-white/10 pt-4 pb-2 mt-2">
                <button onclick="pindahHalaman('gallery', 'sesi-potret')" class="flex items-center gap-1.5 text-xs font-bold tracking-widest text-gray-400 hover:text-white transition">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> BACK
                </button>
                <button onclick="pindahHalaman('gallery', 'done-finish')" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-xl text-xs font-bold tracking-widest transition shadow-lg">
                    FINISH
                </button>
            </div>
        </div>

        <div id="page-result-single" class="page-hidden flex flex-col justify-between h-full w-full z-10">
            <div class="pt-2">
                <button onclick="pindahHalaman('result-single', 'gallery')" class="flex items-center gap-1 text-xs font-bold tracking-wider text-gray-400 hover:text-white transition">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i> BACK
                </button>
            </div>
            <div class="w-full flex-1 bg-zinc-900/40 rounded-[28px] overflow-hidden border border-white/10 my-4 flex items-center justify-center p-2">
                <img id="img-single-view" class="w-full h-full object-contain rounded-2xl" src="">
            </div>
            <div class="pb-4">
                <button onclick="jalankanProsesUnduh()" class="w-full bg-zinc-900 hover:bg-zinc-800 border border-white/10 text-white py-3.5 rounded-xl font-bold text-xs tracking-widest flex items-center justify-center gap-2 transition">
                    <i data-lucide="download" class="w-4 h-4 text-[#E2C799]"></i> DOWNLOAD PHOTO
                </button>
            </div>
        </div>

        <div id="page-done-finish" class="page-hidden flex flex-col justify-center items-center h-full w-full text-center z-10 space-y-4">
            <div class="w-16 h-16 bg-amber-500/10 border border-amber-500/20 rounded-full flex items-center justify-center text-amber-400">
                <i data-lucide="heart" class="w-8 h-8 fill-amber-400"></i>
            </div>
            <div class="space-y-2">
                <h1 class="text-xl font-wedding tracking-widest text-[#E2C799] font-bold">Andi & Zaza</h1>
                <p class="text-[11px] text-gray-400 leading-relaxed px-4">Terima kasih sudah mengabadikan momen bersama kami.</p>
            </div>
            <button onclick="pindahHalaman('done-finish', 'registrasi')" class="border border-white/10 bg-white/5 text-white px-5 py-2.5 rounded-xl text-[11px] font-semibold tracking-wider transition">
                Ambil Foto Baru
            </button>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://plcrvnyfhczykdqrjhfs.supabase.co";
        const SUPABASE_KEY = "sb_publishable_vX_mEtYu3d9iq0CiUBuvyQ_r73lyg0B";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let mediaStream = null;
        let countPotret = 0;
        const LIMIT_FOTO = 20; 
        
        let modeFacing = "user"; 
        let modeFlash = "AUTO";  
        let jenisFilter = "BEAUTY";
        let isAiReady = false;

        // AMBIL SCRIPT UTAMA KETIKA DOM DISIAPKAN
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            setTimeout(inisialisasiAI, 1500); // Beri jeda agar library global terbaca penuh
        });

        // PERBAIKAN INISIALISASI MODEL FACE ID
        async function inisialisasiAI() {
            const statusEl = document.getElementById('status-ai');
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            
            try {
                if (typeof faceapi === 'undefined') {
                    throw new Error("Library faceapi belum termuat sempurna di global scope.");
                }
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                isAiReady = true;
                if(statusEl) statusEl.innerText = "MODEL AI READY";
                console.log("Face-API ready.");
            } catch (err) {
                if(statusEl) statusEl.innerText = "Gagal memuat model AI.";
                console.error("Gagal inisialisasi Face-API:", err);
            }
        }

        function simpanRegistrasiDanLanjut() {
            const nama = document.getElementById('input-nama').value.trim();
            const email = document.getElementById('input-email').value.trim();
            
            if(!nama || !email) {
                alert("Mohon isi Nama Lengkap dan Alamat Email Anda!");
                return;
            }
            pindahHalaman('registrasi', 'sesi-potret');
        }

        async function startKameraOtomatis() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: modeFacing,
                    width: { ideal: 1280 },
                    height: { ideal: 960 }
                },
                audio: false
            };

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                const videoElement = document.getElementById('video-potret');
                videoElement.srcObject = mediaStream;
                
                if (modeFacing === "user") {
                    videoElement.classList.add('mirror-view');
                } else {
                    videoElement.classList.remove('mirror-view');
                }
            } catch (err) {
                console.error("Akses kamera gagal:", err);
            }
        }

        async function toggleKamera() {
            modeFacing = (modeFacing === "user") ? "environment" : "user";
            document.getElementById('text-kamera').innerText = (modeFacing === "user") ? "FRONT" : "BACK";
            await startKameraOtomatis();
        }

        function toggleFlash() {
            const label = document.getElementById('text-flash');
            const icon = document.getElementById('icon-flash');
            
            if (modeFlash === "AUTO") {
                modeFlash = "ON";
                label.innerText = "ON";
                icon.className = "w-4 h-4 text-orange-400";
            } else if (modeFlash === "ON") {
                modeFlash = "OFF";
                label.innerText = "OFF";
                icon.className = "w-4 h-4 text-zinc-500";
            } else {
                modeFlash = "AUTO";
                label.innerText = "AUTO";
                icon.className = "w-4 h-4 text-[#E2C799]";
            }
        }

        function toggleFilter() {
            const videoElement = document.getElementById('video-potret');
            const label = document.getElementById('text-filter');
            videoElement.classList.remove('filter-beauty', 'filter-bw', 'filter-sepia');

            if (jenisFilter === "BEAUTY") {
                jenisFilter = "BW";
                label.innerText = "B&W";
                videoElement.classList.add('filter-bw');
            } else if (jenisFilter === "BW") {
                jenisFilter = "SEPIA";
                label.innerText = "SEPIA";
                videoElement.classList.add('filter-sepia');
            } else {
                jenisFilter = "BEAUTY";
                label.innerText = "BEAUTY";
                videoElement.classList.add('filter-beauty');
            }
        }

        async function pindahHalaman(dari, ke) {
            document.getElementById(`page-${dari}`).classList.add('page-hidden');
            document.getElementById(`page-${ke}`).classList.remove('page-hidden');

            if (ke === 'sesi-potret') {
                countPotret = 0;
                document.getElementById('jumlah-potret').innerText = `0/${LIMIT_FOTO}`;
                await startKameraOtomatis();
            } else if (ke === 'gallery') {
                if (mediaStream) { 
                    mediaStream.getTracks().forEach(track => track.stop()); 
                    mediaStream = null;
                }
                ambilSemuaFotoDariDatabase();
            }
            lucide.createIcons();
        }

        // PERBAIKAN: MENYALAKAN LAMPU HARDWARE FLASH LED (TORCH) KAMERA BELAKANG ASLI
        async function setHardwareTorch(status) {
            if (!mediaStream) return;
            const videoTrack = mediaStream.getVideoTracks()[0];
            if (!videoTrack) return;

            try {
                // Periksa kapabilitas perangkat apakah mendukung fitur 'torch'
                const capabilities = typeof videoTrack.getCapabilities === 'function' ? videoTrack.getCapabilities() : {};
                if (capabilities.torch) {
                    await videoTrack.applyConstraints({
                        advanced: [{ torch: status }]
                    });
                }
            } catch (e) {
                console.warn("Hardware flash LED (torch) tidak dapat diakses pada device/mode kamera ini:", e);
            }
        }

        async function prosesAmbilFoto() {
            if(countPotret >= LIMIT_FOTO) { 
                pindahHalaman('sesi-potret', 'gallery'); 
                return; 
            }

            const flashOverlay = document.getElementById('flash-overlay');
            const harfiahFlashAktif = (modeFlash === "ON" || (modeFlash === "AUTO" && modeFacing === "environment"));

            if (harfiahFlashAktif) {
                // 1. Hidupkan hardware flash lampu asli (Kamera Belakang)
                await setHardwareTorch(true);
                // 2. Beri efek kilatan cahaya putih di layar pelengkap
                flashOverlay.style.opacity = "1";
                
                setTimeout(async () => {
                    jepretDanUpload();
                    setTimeout(async () => {
                        flashOverlay.style.opacity = "0";
                        // 3. Matikan hardware flash setelah snapshot diambil
                        await setHardwareTorch(false);
                    }, 100);
                }, 150);
            } else {
                jepretDanUpload();
            }
        }

        async function jepretDanUpload() {
            const video = document.getElementById('video-potret');
            const loader = document.getElementById('upload-indicator');
            loader.querySelector('[data-lucide="loader-2"]').classList.remove('hidden');

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            
            ctx.save();
            if (modeFacing === "user") {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            
            if (jenisFilter === "BEAUTY") ctx.filter = "contrast(104%) brightness(106%) saturate(103%)";
            else if (jenisFilter === "BW") ctx.filter = "grayscale(100%) contrast(120%)";
            else if (jenisFilter === "SEPIA") ctx.filter = "sepia(70%) contrast(95%) brightness(100%)";

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();
            
            canvas.toBlob(async (blob) => {
                if(!blob) return;
                const namaFile = `photo_${Date.now()}_${Math.random().toString(36).substring(5)}.jpg`;
                const { data, error } = await supabaseClient.storage.from('galeri-foto').upload(namaFile, blob, { contentType: 'image/jpeg' });
                
                loader.querySelector('[data-lucide="loader-2"]').classList.add('hidden');
                if(error) return;

                const centang = loader.querySelector('[data-lucide="check-circle"]');
                centang.classList.remove('hidden');
                setTimeout(() => centang.classList.add('hidden'), 1000);

                countPotret++;
                document.getElementById('jumlah-potret').innerText = `${countPotret}/${LIMIT_FOTO}`;
                if(countPotret === LIMIT_FOTO) pindahHalaman('sesi-potret', 'gallery');
            }, 'image/jpeg', 0.9);
        }

        async function ambilSemuaFotoDariDatabase() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = "<div class='text-center col-span-3 py-20 text-xs text-zinc-600 animate-pulse'>Loading Gallery...</div>";
            
            const { data: daftarFile, error } = await supabaseClient.storage.from('galeri-foto').list('', {
                limit: 40,
                sortBy: { column: 'created_at', order: 'desc' }
            });

            if(error || !daftarFile || daftarFile.length === 0) { 
                grid.innerHTML = "<div class='text-center col-span-3 py-20 text-xs text-zinc-600'>Empty gallery</div>"; 
                return; 
            }

            grid.innerHTML = "";
            daftarFile.forEach(file => {
                if(file.name === '.emptyFolderPlaceholder') return;
                const { data } = supabaseClient.storage.from('galeri-foto').getPublicUrl(file.name);
                
                const kotak = document.createElement('div');
                kotak.className = "w-full aspect-square bg-zinc-900 rounded-2xl overflow-hidden border border-white/5 active:scale-95 transition shadow-md relative block";
                kotak.onclick = () => {
                    document.getElementById('img-single-view').src = data.publicUrl;
                    pindahHalaman('gallery', 'result-single');
                };
                kotak.innerHTML = `<img src="${data.publicUrl}" class="w-full h-full object-cover pointer-events-none">`;
                grid.appendChild(kotak);
            });
        }

        async function jalankanProsesUnduh() {
            const urlGambar = document.getElementById('img-single-view').src;
            if(!urlGambar) return;

            try {
                const response = await fetch(urlGambar);
                const blob = await response.blob();
                const urlBlob = window.URL.createObjectURL(blob);
                
                const linkJangkar = document.createElement('a');
                linkJangkar.href = urlBlob;
                linkJangkar.download = `booth_${Date.now()}.jpg`;
                document.body.appendChild(linkJangkar);
                linkJangkar.click();
                
                setTimeout(() => {
                    document.body.removeChild(linkJangkar);
                    window.URL.revokeObjectURL(urlBlob);
                }, 150);
            } catch (e) {
                window.open(urlGambar, '_blank');
            }
        }

        // FUNGSI FACE ID SEKARANG BERFUNGSI SEPENUHNYA
        function jalankanScanWajah() {
            if(!isAiReady) {
                alert("Model AI Face ID belum siap atau gagal dimuat. Sila muat semula halaman.");
                return;
            }
            alert("Sistem mengaktifkan modul kamera imbasan Face ID wajah...");
            // Logika lanjutan deteksi wajah anda (faceapi.detectAllFaces dll) kini boleh berjalan tanpa crash global.
            pindahHalaman('faceid-scan', 'gallery');
        }
    </script>
</body>
</html>
