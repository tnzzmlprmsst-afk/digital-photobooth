<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Booth</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#090909;color:#fff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
:root{
  --bg:#090909;
  --s1:#111114;
  --s2:#18181c;
  --s3:#222228;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --gold:#C9A96E;
  --gold-bg:rgba(201,169,110,0.14);
  --muted:#52525e;
  --muted2:#71717a;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}

/* ─── PAGES ─── */
.page{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:opacity .18s,transform .18s}
.page.off{opacity:0;pointer-events:none;display:none}

/* ══════════════ CAMERA PAGE ══════════════ */
#pg-cam{background:#000}
#cam-vp{position:absolute;inset:0;overflow:hidden}
#vid-main{width:100%;height:100%;object-fit:cover;display:block}

.vp-fade-top{position:absolute;inset:0 0 auto 0;height:160px;background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);pointer-events:none;z-index:2}
.vp-fade-bot{position:absolute;inset:auto 0 0 0;height:240px;background:linear-gradient(to top,rgba(0,0,0,.82),transparent);pointer-events:none;z-index:2}

/* Analog overlays on live view */
#cam-grain{position:absolute;inset:0;pointer-events:none;z-index:3;opacity:0;mix-blend-mode:overlay;transition:opacity .3s}
#cam-vignette{position:absolute;inset:0;pointer-events:none;z-index:3;opacity:0;border-radius:0;transition:opacity .3s;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.55) 100%)}
#cam-chromab{position:absolute;inset:0;pointer-events:none;z-index:4;opacity:0;transition:opacity .3s;mix-blend-mode:screen;border-radius:0}

/* Top bar */
.cam-bar{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t) + 16px) 20px 14px;
  gap:8px;
}
.cam-bar-center{
  display:flex;align-items:center;gap:10px;
  position:absolute;left:50%;transform:translateX(-50%);
}
.facing-lbl{font-size:10px;font-weight:700;letter-spacing:.18em;color:rgba(255,255,255,.38);text-transform:uppercase}
.ico-btn{
  width:38px;height:38px;border-radius:50%;
  background:rgba(0,0,0,.38);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .12s,transform .08s;position:relative;
}
.ico-btn:active{transform:scale(.84)}
.ico-btn svg{width:17px;height:17px;stroke:rgba(255,255,255,.82);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
.ico-btn.lit svg{stroke:var(--gold)}
.ico-btn.flash-on svg{stroke:#FFD60A}
.ico-btn.flash-off svg{stroke:var(--muted)}
.flash-lbl{
  position:absolute;bottom:-2px;right:-2px;
  font-size:7px;font-weight:800;border-radius:4px;
  padding:1px 3px;background:#FFD60A;color:#000;letter-spacing:.04em;
  display:none;
}
.ico-btn.flash-on .flash-lbl{display:block}

/* Filter strip — slide in from bottom, hidden by default */
#filter-panel{
  position:absolute;bottom:96px;left:0;right:0;z-index:9;
  transform:translateY(14px);opacity:0;pointer-events:none;
  transition:transform .24s cubic-bezier(.32,0,.2,1),opacity .2s;
}
#filter-panel.open{transform:translateY(0);opacity:1;pointer-events:all}

.filter-row{
  display:flex;gap:10px;padding:4px 18px 8px;
  overflow-x:auto;scroll-snap-type:x mandatory;
  -ms-overflow-style:none;scrollbar-width:none;
}
.filter-row::-webkit-scrollbar{display:none}

.f-item{
  flex:0 0 auto;scroll-snap-align:start;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;transition:transform .12s;
}
.f-item:active{transform:scale(.9)}

.f-thumb{
  width:54px;height:70px;border-radius:10px;overflow:hidden;
  position:relative;border:2px solid rgba(255,255,255,.08);
  transition:border-color .18s,box-shadow .18s;background:#111;
}
.f-item.sel .f-thumb{border-color:var(--gold);box-shadow:0 0 0 1px rgba(201,169,110,.3),0 4px 16px rgba(201,169,110,.18)}

.f-thumb-canvas{width:100%;height:100%;display:block;object-fit:cover}

/* Analog layers inside each thumbnail */
.f-grain,.f-vignette,.f-chromab{
  position:absolute;inset:0;pointer-events:none;border-radius:8px;
}
.f-vignette{background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.5) 100%)}
.f-chromab{mix-blend-mode:screen;opacity:0}

.f-thumb-label{
  position:absolute;bottom:0;left:0;right:0;
  padding:3px 4px 5px;
  background:rgba(0,0,0,.58);backdrop-filter:blur(5px);
  font-size:7.5px;font-weight:700;color:#fff;text-align:center;
  letter-spacing:.04em;line-height:1.1;
}
.f-name{font-size:9px;font-weight:500;color:rgba(255,255,255,.4);letter-spacing:.02em;white-space:nowrap;transition:color .18s}
.f-item.sel .f-name{color:var(--gold)}

/* Bottom controls */
.cam-ctrls{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 26px calc(var(--safe-b) + 26px);
}
.gallery-thumb{
  width:46px;height:46px;border-radius:11px;
  background:rgba(0,0,0,.4);backdrop-filter:blur(10px);
  border:1px solid var(--border2);
  overflow:hidden;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s;
}
.gallery-thumb:active{transform:scale(.88)}
.gallery-thumb img{width:100%;height:100%;object-fit:cover}
.gallery-thumb svg{width:20px;height:20px;stroke:var(--muted2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.shutter{
  width:74px;height:74px;border-radius:50%;
  background:transparent;border:3px solid rgba(255,255,255,.88);
  padding:6px;cursor:pointer;transition:transform .1s;
}
.shutter:active{transform:scale(.9)}
.shutter-inner{width:100%;height:100%;border-radius:50%;background:#fff;transition:transform .1s}
.shutter:active .shutter-inner{transform:scale(.86)}

.counter-pill{
  width:46px;height:46px;border-radius:11px;
  background:rgba(0,0,0,.4);backdrop-filter:blur(10px);
  border:1px solid var(--border2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.counter-n{font-size:17px;font-weight:900;color:#fff;line-height:1}
.counter-d{font-size:8px;font-weight:600;color:var(--muted2);line-height:1;margin-top:2px}

#flash-ov{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:9999;transition:opacity .05s}

/* ══════════════ GALLERY PAGE ══════════════ */
#pg-gallery{padding-top:calc(var(--safe-t))}
.gl-top{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:20px 20px 12px;flex-shrink:0;
}
.gl-title-wrap h1{font-size:23px;font-weight:900;letter-spacing:-.022em}
.gl-title-wrap p{font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--muted2);margin-top:3px;text-transform:uppercase}

/* Tab switcher */
.gl-tabs{
  display:flex;gap:2px;
  padding:0 20px 10px;flex-shrink:0;
}
.gl-tab{
  flex:1;padding:8px 0;text-align:center;
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted2);border-radius:8px;cursor:pointer;transition:background .15s,color .15s;
  border:1px solid transparent;
}
.gl-tab.active{background:var(--s2);border-color:var(--border2);color:#fff}

.gl-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.gl-meta-name{font-size:12px;font-weight:300;font-style:italic;color:var(--gold);letter-spacing:.04em;line-height:1.5}
.gl-meta-amp{font-size:9px;color:var(--muted);text-align:right}

.scan-btn{
  width:38px;height:38px;border-radius:10px;
  background:var(--gold-bg);border:1px solid rgba(201,169,110,.22);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;transition:background .12s,transform .1s;
}
.scan-btn:active{transform:scale(.88);background:rgba(201,169,110,.24)}
.scan-btn svg{width:17px;height:17px;stroke:var(--gold);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.scan-btn span{font-size:7px;font-weight:800;letter-spacing:.1em;color:var(--gold);text-transform:uppercase}

.gl-grid-wrap{flex:1;overflow-y:auto;padding:0 2px;-ms-overflow-style:none;scrollbar-width:none}
.gl-grid-wrap::-webkit-scrollbar{display:none}
.gl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.gl-item{aspect-ratio:3/4;background:var(--s2);overflow:hidden;cursor:pointer;transition:opacity .1s;position:relative}
.gl-item:first-child{border-top-left-radius:10px}
.gl-item:nth-child(3){border-top-right-radius:10px}
.gl-item img{width:100%;height:100%;object-fit:cover;display:block}
.gl-item:active{opacity:.7}
.gl-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);grid-column:1/-1;padding:60px 20px;text-align:center}
.gl-empty svg{width:32px;height:32px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.gl-empty p{font-size:12px;font-weight:500;line-height:1.6}

.gl-bot{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px calc(var(--safe-b) + 18px);
  border-top:1px solid var(--border);flex-shrink:0;
}
.ghost-btn{
  display:flex;align-items:center;gap:5px;background:none;border:none;
  font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--muted2);
  cursor:pointer;text-transform:uppercase;transition:color .12s;
}
.ghost-btn:active{color:#fff}
.ghost-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.prim-btn{
  background:var(--gold);color:#090909;border:none;border-radius:9px;
  padding:11px 22px;font-size:11px;font-weight:800;letter-spacing:.1em;
  cursor:pointer;text-transform:uppercase;transition:opacity .12s,transform .1s;
}
.prim-btn:active{opacity:.82;transform:scale(.96)}

/* ══════════════ SINGLE VIEW ══════════════ */
#pg-single{background:#000;position:relative}
#single-img{width:100%;height:100%;object-fit:contain;display:block}
.single-top{
  position:absolute;top:0;left:0;right:0;z-index:5;
  display:flex;align-items:center;
  padding:calc(var(--safe-t)+14px) 18px 14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.72),transparent);
}
.single-bot{
  position:absolute;bottom:0;left:0;right:0;z-index:5;
  padding:14px 18px calc(var(--safe-b)+22px);
  background:linear-gradient(to top,rgba(0,0,0,.72),transparent);
}
.dl-btn{
  width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(14px);border-radius:12px;padding:14px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:12px;font-weight:700;letter-spacing:.1em;color:#fff;
  cursor:pointer;text-transform:uppercase;transition:background .12s;
}
.dl-btn:active{background:rgba(255,255,255,.18)}
.dl-btn svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ══════════════ FINISH ══════════════ */
#pg-finish{align-items:center;justify-content:center;gap:20px}
.finish-ring{width:60px;height:60px;border-radius:50%;background:var(--gold-bg);border:1px solid rgba(201,169,110,.2);display:flex;align-items:center;justify-content:center}
.finish-ring svg{width:26px;height:26px;fill:var(--gold)}
.finish-text{text-align:center}
.finish-text h1{font-size:20px;font-weight:300;font-style:italic;color:var(--gold);letter-spacing:.04em;margin-bottom:8px}
.finish-text p{font-size:11px;color:var(--muted2);line-height:1.75;max-width:230px}
.outline-btn{background:transparent;border:1px solid var(--border2);border-radius:10px;padding:12px 28px;font-size:11px;font-weight:700;letter-spacing:.1em;color:#fff;cursor:pointer;text-transform:uppercase;transition:background .12s,transform .1s}
.outline-btn:active{background:rgba(255,255,255,.06);transform:scale(.96)}

/* ══════════════ FACE ID PAGE ══════════════ */
#pg-faceid{
  background:rgba(4,4,6,.96);backdrop-filter:blur(22px);z-index:200;
  align-items:center;gap:12px;
  padding:calc(var(--safe-t)+16px) 18px calc(var(--safe-b)+16px);
}
#pg-faceid.off{display:none}
.fid-head{text-align:center;flex-shrink:0}
.fid-head h2{font-size:12px;font-weight:800;letter-spacing:.2em;text-transform:uppercase}
.fid-head p{font-size:11px;color:var(--muted2);margin-top:5px;min-height:15px;transition:color .2s}
.fid-head p.found{color:#30d158}
.fid-head p.err{color:#ff453a}

.fid-search-info{font-size:10px;color:var(--muted);text-align:center;max-width:340px;line-height:1.65;flex-shrink:0}

.fid-cam-wrap{
  position:relative;border-radius:18px;overflow:hidden;
  width:100%;max-width:340px;flex:1;max-height:360px;
  background:#0a0a0a;border:1px solid var(--border2);flex-shrink:0;
}
/* NOT mirrored — show as-is (correct orientation) */
#fid-vid{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(1)}
#fid-cvs{position:absolute;inset:0;width:100%;height:100%}

@keyframes scanline{0%{top:-2px}100%{top:100%}}
#scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--gold),transparent);animation:scanline 2.2s linear infinite;z-index:5;opacity:.65;display:none;pointer-events:none}
#scan-line.active{display:block}

.fid-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;width:100%;max-width:340px;flex-shrink:0}
.fid-badge{background:var(--s2);border:1px solid var(--border2);border-radius:9px;padding:7px 12px;text-align:center;font-size:10px;color:var(--gold);font-weight:600;line-height:1.6}
.fid-badge b{display:block;font-size:11px;font-weight:800;color:#fff}
.fid-badge small{font-size:9px;color:var(--muted2);font-weight:500}

#fid-results{
  width:100%;max-width:340px;max-height:140px;overflow-y:auto;
  display:flex;flex-direction:column;gap:6px;flex-shrink:0;
  -ms-overflow-style:none;scrollbar-width:none;
}
#fid-results::-webkit-scrollbar{display:none}
.fid-result-item{
  display:flex;align-items:center;gap:10px;
  background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:8px 12px;
  cursor:pointer;transition:background .12s;
}
.fid-result-item:active{background:var(--s3)}
.fid-result-img{width:36px;height:46px;border-radius:6px;object-fit:cover;flex-shrink:0}
.fid-result-info{flex:1}
.fid-result-info p{font-size:11px;font-weight:600;color:#fff}
.fid-result-info small{font-size:10px;color:var(--muted2)}
.fid-result-badge{font-size:9px;font-weight:800;letter-spacing:.05em;background:var(--gold-bg);color:var(--gold);border-radius:5px;padding:2px 6px;text-transform:uppercase}

.fid-actions{display:flex;gap:8px;width:100%;max-width:340px;flex-shrink:0}
.fid-btn{flex:1;border-radius:10px;padding:13px;font-size:11px;font-weight:700;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;border:1px solid var(--border2);background:var(--s2);color:#fff;transition:background .12s}
.fid-btn:active{background:var(--s3)}
.fid-btn.gold{background:var(--gold);color:#090909;border-color:var(--gold)}
.fid-btn.gold:active{opacity:.84}

/* toast */
#toast{
  position:fixed;bottom:calc(var(--safe-b)+100px);left:50%;
  transform:translateX(-50%) translateY(8px);
  background:rgba(20,20,24,.94);border:1px solid var(--border2);
  backdrop-filter:blur(16px);border-radius:20px;
  padding:7px 14px;display:flex;align-items:center;gap:7px;
  font-size:11px;font-weight:600;color:#fff;
  opacity:0;transition:opacity .18s,transform .18s;
  pointer-events:none;z-index:800;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div id="flash-ov"></div>

<!-- ══ CAMERA ══ -->
<div id="pg-cam" class="page">
  <div id="cam-vp">
    <div class="vp-fade-top"></div>
    <div class="vp-fade-bot"></div>
    <video id="vid-main" autoplay muted playsinline></video>
    <!-- Analog overlay layers on live view -->
    <canvas id="cam-grain"></canvas>
    <div id="cam-vignette"></div>
    <canvas id="cam-chromab"></canvas>

    <!-- Top bar -->
    <div class="cam-bar">
      <button class="ico-btn" id="btn-flip" onclick="flipCam()">
        <svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      </button>
      <div class="cam-bar-center">
        <button class="ico-btn" id="btn-flash" onclick="cycleFlash()">
          <!-- flash icon rendered by JS -->
          <div class="flash-lbl" id="flash-lbl"></div>
        </button>
        <span class="facing-lbl" id="lbl-facing">FRONT</span>
      </div>
      <button class="ico-btn" id="btn-filter-toggle" onclick="toggleFilterPanel()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      </button>
    </div>

    <!-- Filter strip -->
    <div id="filter-panel">
      <div class="filter-row" id="filter-row"></div>
    </div>

    <!-- Controls -->
    <div class="cam-ctrls">
      <div class="gallery-thumb" onclick="goTo('pg-gallery',loadGallery)" id="gthumb">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <div class="shutter" id="shutter" onclick="capture()"><div class="shutter-inner"></div></div>
      <div class="counter-pill">
        <span class="counter-n" id="cnt-n">0</span>
        <span class="counter-d" id="cnt-d">/ 20</span>
      </div>
    </div>
  </div>
</div>

<!-- ══ GALLERY ══ -->
<div id="pg-gallery" class="page off">
  <div class="gl-top">
    <div class="gl-title-wrap"><h1>Gallery</h1><p>Your moments</p></div>
    <div class="gl-right">
      <button class="scan-btn" onclick="goTo('pg-faceid',startFaceID)">
        <svg viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        <span>Scan</span>
      </button>
      <div><div class="gl-meta-name">Zuzu</div><div class="gl-meta-amp">&amp;</div><div class="gl-meta-name">Zaza</div></div>
    </div>
  </div>

  <!-- Tab switcher: All / My Faces -->
  <div class="gl-tabs">
    <div class="gl-tab active" id="tab-all" onclick="switchTab('all')">All Photos</div>
    <div class="gl-tab" id="tab-faces" onclick="switchTab('faces')">My Faces <span id="face-count" style="font-size:9px;background:var(--gold-bg);color:var(--gold);border-radius:4px;padding:1px 5px;margin-left:4px;display:none"></span></div>
  </div>

  <div class="gl-grid-wrap">
    <div class="gl-grid" id="gl-grid">
      <div class="gl-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><p>No photos yet</p></div>

async function startCamera() {

    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{exact:facing}, width:{ideal:1280}, height:{ideal:960} }, audio:false

function cycleFlash() {

  if (flashMode==="on" && facing==="environment") torchOn();

async function torchOn() {
  if(!stream) return;
  const vt = stream.getVideoTracks()[0];

}
async function torchOff() {
  if(!stream) return;
  const vt = stream.getVideoTracks()[0];

}

/* ════ ANALOG OVERLAYS ON LIVE VIEW ════ */
let grainRaf = null;
const camGrain   = document.getElementById('cam-grain');
const camVig     = document.getElementById('cam-vignette');
const camChromab = document.getElementById('cam-chromab');

function startAnalogOverlay() {
  if (grainRaf) cancelAnimationFrame(grainRaf);
  renderAnalogOverlay();
}

function renderAnalogOverlay() {
  const f = FILTERS[filterIdx];
  const w = vidMain.clientWidth || window.innerWidth;
  const h = vidMain.clientHeight || window.innerHeight;

  // Grain on cam-grain canvas
  if (f.grain > 0) {
    camGrain.style.opacity = Math.min(1, f.grain/22).toFixed(2);
    camGrain.width = Math.floor(w/3); // low-res for perf
    camGrain.height = Math.floor(h/3);
    const ctx = camGrain.getContext('2d');
    const id  = ctx.createImageData(camGrain.width, camGrain.height);
    const d   = id.data;
    for (let i=0;i<d.length;i+=4) {
      const v = Math.random()*255|0;
      d[i]=d[i+1]=d[i+2]=v; d[i+3]=255;
    }
    ctx.putImageData(id,0,0);
    camGrain.style.cssText += ";position:absolute;inset:0;width:100%;height:100%;mix-blend-mode:overlay;pointer-events:none;z-index:3;image-rendering:pixelated";
  } else {
    camGrain.style.opacity = "0";
  }

  // Vignette
  camVig.style.opacity = f.vignette.toFixed(2);

  // Chromatic aberration: offset canvas with color tint
  if (f.chromab && f.chromabColor) {
    camChromab.style.opacity = "1";
    camChromab.style.cssText += ";position:absolute;left:3px;top:2px;width:100%;height:100%;pointer-events:none;z-index:4;mix-blend-mode:screen";
    camChromab.width = 2; camChromab.height = 2;
    const ctx = camChromab.getContext('2d');
    ctx.fillStyle = f.chromabColor;
    ctx.fillRect(0,0,2,2);
  } else {
    camChromab.style.opacity = "0";
  }

  grainRaf = requestAnimationFrame(renderAnalogOverlay);
}

/* ════ FILTER PANEL ════ */
function buildFilterStrip() {
  const row = document.getElementById('filter-row');
  row.innerHTML = "";
  thumbCanvases = [];

  FILTERS.forEach((f,i) => {
    const item = document.createElement('div');
    item.className = "f-item" + (i===0?" sel":"");

    const thumb = document.createElement('div');

    // Live preview canvas
    const cvs = document.createElement('canvas');

    cvs.width = 54; cvs.height = 70;
    cvs.style.filter = f.videoFilter || "";
    thumbCanvases.push(cvs);
    thumb.appendChild(cvs);

    // Vignette overlay
    const vig = document.createElement('div');
    vig.className = "f-vignette";
    vig.style.opacity = f.vignette;
    thumb.appendChild(vig);

    // Chromatic aberration overlay
    if (f.chromab) {

    name.textContent = f.name;

    item.appendChild(thumb);
    item.appendChild(name);
    row.appendChild(item);
  });
}

function drawThumbs() {
  if (vidMain.readyState >= 2) {
    thumbCanvases.forEach(cvs => {
      const ctx = cvs.getContext('2d');
      ctx.save();
      // Mirror thumbnail for front cam
      if (facing==="user") { ctx.translate(54,0); ctx.scale(-1,1); }
      ctx.drawImage(vidMain,0,0,54,70);
      ctx.restore();
    });
  }
  thumbRaf = requestAnimationFrame(drawThumbs);
}

function toggleFilterPanel() {

  document.getElementById('btn-filter-toggle').classList.toggle('lit', filterOpen);

function selectFilter(i) {
  filterIdx = i;
  applyVideoFilter(i);

/* ════ CAPTURE — non-blocking ════ */
function capture() {
  if (count >= MAX_PHOTOS) { goTo('pg-gallery', loadGallery); return; }
  const isBack = facing==="environment";
  const doFlash = flashMode==="on" || flashMode==="auto";

  if (doFlash) {
    if (isBack) {
      torchOn();
      setTimeout(() => { snapshotAndUpload(); setTimeout(torchOff, 180); }, 55);
    } else {
      const fl = document.getElementById('flash-ov');
      fl.style.opacity = "1";
      setTimeout(() => { snapshotAndUpload(); setTimeout(()=>{ fl.style.opacity="0"; }, 90); }, 55);
    }
  } else {
    snapshotAndUpload();
  }
}

async function snapshotAndUpload() {
  const W = vidMain.videoWidth||640, H = vidMain.videoHeight||480;
  const cvs = document.createElement('canvas');
  cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  const f = FILTERS[filterIdx];

  ctx.save();
  // Front camera: flip captured image (mirror selfie)
  if (facing==="user") { ctx.translate(W,0); ctx.scale(-1,1); }
  ctx.filter = f.canvasFilter || "none";
  ctx.drawImage(vidMain,0,0,W,H);
  ctx.restore();

  // Film grain
  if (f.grain > 0) addGrain(ctx, W, H, f.grain);
  // Vignette
  if (f.vignette > 0) addVignette(ctx, W, H, f.vignette);
  // Chromatic aberration
  if (f.chromab) addChromab(ctx, W, H, f.chromabColor);

  // Increment counter immediately
  count++;
  document.getElementById('cnt-n').textContent = count;
  if (count >= MAX_PHOTOS) setTimeout(()=>goTo('pg-gallery',loadGallery), 350);

  // Upload in background
  cvs.toBlob(async blob => {
    if (!blob) return;
    const name = `photo_${Date.now()}_${Math.random().toString(36).slice(2,6)}.jpg`;
    const {error} = await SB.storage.from('galeri-foto').upload(name,blob,{contentType:'image/jpeg'});
    if (error) toast("Upload failed","err");
    else toast("Saved ✓","ok");
  },'image/jpeg',0.92);
}

function addGrain(ctx, w, h, amt) {
  const d = ctx.getImageData(0,0,w,h), px=d.data;
  for(let i=0;i<px.length;i+=4){
    const n=(Math.random()-.5)*amt*2;
    px[i]=Math.max(0,Math.min(255,px[i]+n));
    px[i+1]=Math.max(0,Math.min(255,px[i+1]+n));
    px[i+2]=Math.max(0,Math.min(255,px[i+2]+n));
  }
  ctx.putImageData(d,0,0);
}

function addVignette(ctx, w, h, strength) {
  const g=ctx.createRadialGradient(w/2,h/2,h*.25,w/2,h/2,h*.72);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,`rgba(0,0,0,${strength})`);
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
}

function addChromab(ctx, w, h, color) {
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.globalCompositeOperation = "screen";
  ctx.translate(3, 2);
  ctx.filter = "none";
  // Draw a subtle color-shifted copy
  ctx.fillStyle = color || "rgba(255,0,0,0.1)";
  ctx.fillRect(0,0,w,h);
  ctx.restore();
}

/* ════ GALLERY ════ */
async function loadGallery() {
  renderGrid(null); // loading state
  const {data, error} = await SB.storage.from('galeri-foto').list('',{
    limit:100, sortBy:{column:'created_at',order:'desc'}
  });

  galleryData = data
    .filter(f=>f.name!=='.emptyFolderPlaceholder')
    .map(f=>{ const {data:pu}=SB.storage.from('galeri-foto').getPublicUrl(f.name); return {name:f.name,url:pu.publicUrl}; });

  renderGrid(galleryData);
  // Update gallery thumb
  if (galleryData.length) {
    const btn = document.getElementById('gthumb');
    btn.innerHTML = `<img src="${galleryData[0].url}">`;
  }
}

let fidStream=null, fidRaf=null, fidLoaded=false, capturedDescriptor=null, isFidScanning=false;

async function loadFaceModels() {
  if (fidLoaded) return true;
  setFidStatus("Loading AI models… (first time only)");
  try {
    await Promise.all([
      faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
      faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
      faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL)
    ]);
    fidLoaded=true; return true;
  } catch(e) {
    setFidStatus("Failed to load AI models.",true); return false;
  }
}

function setFidStatus(txt, isErr=false) {
  const el=document.getElementById('fid-status');
  el.textContent=txt;
  el.className=isErr?"err":(txt.includes("✓")||txt.includes("Found")?"found":"");
}

async function startFaceID() {
  capturedDescriptor=null;
  document.getElementById('fid-badges').innerHTML="";
  document.getElementById('fid-results').innerHTML="";
  document.getElementById('btn-do-search').style.display="none";
  document.getElementById('scan-line').classList.remove('active');
  setFidStatus("Loading AI models…");

  const ok=await loadFaceModels();
  if(!ok) return;
  setFidStatus("Starting camera…");

  try {
    fidStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"user",width:{ideal:640},height:{ideal:480}},audio:false
    });
  } catch { setFidStatus("Camera access denied.",true); return; }

  const vid=document.getElementById('fid-vid');
  // NOT mirrored — draw detection boxes in real orientation
  vid.style.transform = "scaleX(1)";
  vid.srcObject=fidStream;
  await vid.play();
  setFidStatus("Point your face at the camera…");
  isFidScanning=true;
  runFidLoop();
}

async function runFidLoop() {
  const vid=document.getElementById('fid-vid');
  const cvs=document.getElementById('fid-cvs');
  const wrap=cvs.parentElement;
  cvs.width=wrap.offsetWidth; cvs.height=wrap.offsetHeight;
  const ctx=cvs.getContext('2d');

  const tick=async()=>{
    if(!fidStream||!isFidScanning) return;
    const dets=await faceapi
      .detectAllFaces(vid,new faceapi.SsdMobilenetv1Options({minConfidence:.48}))
      .withFaceLandmarks().withFaceExpressions().withAgeAndGender().withFaceDescriptors();

    ctx.clearRect(0,0,cvs.width,cvs.height);
    const sx=cvs.width/vid.videoWidth, sy=cvs.height/vid.videoHeight;

    if(!dets.length) {
      setFidStatus("No face detected — move closer…");
      capturedDescriptor=null;
      document.getElementById('btn-do-search').style.display="none";
      document.getElementById('fid-badges').innerHTML="";
      document.getElementById('scan-line').classList.remove('active');
    } else {
      // Draw in real (non-mirrored) space since video is not mirrored
      dets.forEach(det=>{
        const b=det.detection.box;
        const bx=b.x*sx, by=b.y*sy, bw=b.width*sx, bh=b.height*sy;
        ctx.strokeStyle="rgba(201,169,110,.85)"; ctx.lineWidth=1.5; ctx.strokeRect(bx,by,bw,bh);
        const cs=13; ctx.strokeStyle=CSS_GOLD; ctx.lineWidth=2.6;
        [[bx,by,1,1],[bx+bw,by,-1,1],[bx,by+bh,1,-1],[bx+bw,by+bh,-1,-1]].forEach(([cx,cy,dx,dy])=>{
          ctx.beginPath(); ctx.moveTo(cx+dx*cs,cy); ctx.lineTo(cx,cy); ctx.lineTo(cx,cy+dy*cs); ctx.stroke();
        });
        ctx.fillStyle="rgba(201,169,110,.45)";
        det.landmarks.positions.forEach(p=>{
          ctx.beginPath(); ctx.arc(p.x*sx,p.y*sy,1.2,0,Math.PI*2); ctx.fill();
        });
      });

      capturedDescriptor=dets[0].descriptor;
      const g=dets[0].gender==="male"?"Male":"Female";
      const age=Math.round(dets[0].age);
      const EXP={happy:"Happy",sad:"Sad",angry:"Angry",fearful:"Fearful",disgusted:"Disgusted",surprised:"Surprised",neutral:"Neutral"};
      const topExp=Object.entries(dets[0].expressions).sort((a,b)=>b[1]-a[1])[0];
      document.getElementById('fid-badges').innerHTML=
        `<div class="fid-badge"><b>${g}, ~${age} yrs</b><small>${EXP[topExp[0]]||topExp[0]}</small></div>`;
      setFidStatus("Face captured ✓ — press Search My Photos");
      document.getElementById('btn-do-search').style.display="block";
      document.getElementById('scan-line').classList.add('active');
    }
    fidRaf=requestAnimationFrame(tick);
  };
  fidRaf=requestAnimationFrame(tick);
}

const CSS_GOLD="#C9A96E";

async function doFaceSearch() {
  if(!capturedDescriptor){setFidStatus("Scan your face first.");return;}
  if(!galleryData.length){setFidStatus("Gallery is empty.",true);return;}

  setFidStatus(`Scanning ${galleryData.length} photos…`);
  document.getElementById('fid-results').innerHTML="";
  const btn=document.getElementById('btn-do-search');
  btn.textContent="Searching…"; btn.disabled=true;

  const THRESHOLD=0.52, matches=[];
  for(let i=0;i<galleryData.length;i++){
    setFidStatus(`Photo ${i+1} / ${galleryData.length}…`);
    try{
      const img=await loadImg(galleryData[i].url);
      const dets=await faceapi
        .detectAllFaces(img,new faceapi.SsdMobilenetv1Options({minConfidence:.42}))
        .withFaceLandmarks().withFaceDescriptors();
      for(const d of dets){
        const dist=faceapi.euclideanDistance(capturedDescriptor,d.descriptor);
        if(dist<THRESHOLD){matches.push({url:galleryData[i].url,dist});break;}
      }
    }catch{}
  }

  btn.textContent="Search My Photos"; btn.disabled=false;

  if(!matches.length){
    setFidStatus("No matching photos found.",true);
    document.getElementById('fid-results').innerHTML=`<div class="fid-badge" style="width:100%;text-align:center"><small>No photos matched your face in the gallery</small></div>`;
    return;
  }

  matches.sort((a,b)=>a.dist-b.dist);
  faceMatchUrls=matches.map(m=>m.url);
  setFidStatus(`✓ Found ${matches.length} photo${matches.length>1?'s':''} of you!`);

  // Show in results list
  const res=document.getElementById('fid-results');
  res.innerHTML="";
  matches.forEach((m,i)=>{
    const pct=Math.round((1-m.dist)*100);
    const el=document.createElement('div');
    el.className="fid-result-item";
    el.innerHTML=`<img class="fid-result-img" src="${m.url}"><div class="fid-result-info"><p>Match #${i+1}</p><small>${pct}% confidence</small></div><span class="fid-result-badge">${pct}%</span>`;
    el.onclick=()=>{ document.getElementById('single-img').src=m.url; closeFaceID(); goTo('pg-single'); };
    res.appendChild(el);
  });

  // Update gallery face tab badge
  const fc=document.getElementById('face-count');
  fc.textContent=matches.length; fc.style.display="inline";
}

function loadImg(url){
  return new Promise((res,rej)=>{
    const img=new Image(); img.crossOrigin="anonymous";
    img.onload=()=>res(img); img.onerror=rej;
    img.src=url;
  });
}

function closeFaceID() {
  isFidScanning=false;
  cancelAnimationFrame(fidRaf); fidRaf=null;
  if(fidStream){fidStream.getTracks().forEach(t=>t.stop());fidStream=null;}
  const v=document.getElementById('fid-vid'); v.srcObject=null;
  const c=document.getElementById('fid-cvs'); c.getContext('2d').clearRect(0,0,c.width,c.height);
  document.getElementById('scan-line').classList.remove('active');
  document.getElementById('fid-badges').innerHTML="";
  document.getElementById('fid-results').innerHTML="";
  capturedDescriptor=null;
  // Go to gallery — if we have matches, switch to faces tab
  goTo('pg-gallery');
  if(faceMatchUrls.length){
    setTimeout(()=>switchTab('faces'),100);
  }
}
