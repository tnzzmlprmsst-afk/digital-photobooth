<!DOCTYPE html>
<html lang="id" class="w-full h-full m-0 p-0 overflow-hidden select-none touch-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Digital Photobooth</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');
        body { 
            background-color: #0A0A0A;
            font-family: 'Montserrat', sans-serif; 
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .font-wedding { font-family: 'Cinzel', serif; }
        .page-hidden { display: none !important; }
        
        /* Efek Mirror untuk Kamera Depan */
        .mirror-view { transform: scaleX(-1); }
        
        /* Filter Kamera */
        .filter-beauty { filter: contrast(104%) brightness(106%) saturate(103%); }
        .filter-bw { filter: grayscale(100%) contrast(120%); }
        .filter-sepia { filter: sepia(70%) contrast(95%) brightness(100%); }

        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="w-full h-full m-0 p-0 overflow-hidden flex justify-center items-center bg-[#0A0A0A]">

    <div class="w-full h-full max-w-[500px] bg-[#0A0A0A] relative overflow-hidden flex flex-col justify-between text-white p-6 pt-10">
        
        <div id="page-sesi-potret" class="flex flex-col justify-between h-full w-full relative z-10">
            
            <div class="flex justify-between items-center px-4 z-30 bg-black/20 py-2 rounded-2xl backdrop-blur-sm">
                <button onclick="toggleKamera()" class="flex flex-col items-center gap-1 text-[10px] font-medium tracking-widest text-gray-400 hover:text-white transition active:scale-95">
                    <i data-lucide="refresh-cw" class="w-4 h-4 text-amber-500"></i>
                    <span id="text-kamera">FRONT</span>
                </button>
                <button onclick="toggleFlash()" class="flex flex-col items-center gap-1 text-[10px] font-medium tracking-widest text-gray-400 hover:text-white transition active:scale-95">
                    <i data-lucide="zap" id="icon-flash" class="w-4 h-4 text-amber-500"></i>
                    <span id="text-flash">AUTO</span>
                </button>
                <button onclick="toggleFilter()" class="flex flex-col items-center gap-1 text-[10px] font-medium tracking-widest text-gray-400 hover:text-white transition active:scale-95">
                    <i data-lucide="aperture" class="w-4 h-4 text-amber-500"></i>
                    <span id="text-filter">BEAUTY</span>
                </button>
            </div>

            <div class="w-full flex-1 aspect-[3/4] my-6 rounded-[32px] overflow-hidden bg-zinc-900 relative border border-white/5 shadow-2xl flex items-center justify-center">
                <video id="video-potret" class="w-full h-full object-cover mirror-view filter-beauty" autoplay muted playsinline></video>
                
                <div id="flash-overlay" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-50 transition-opacity duration-75"></div>

                <div class="absolute bottom-6 left-6 bg-black/70 backdrop-blur-md px-3 py-1.5 rounded-full text-[11px] font-semibold tracking-wide border border-white/10 flex items-center gap-1.5 z-40">
                    <span>📷 Frame:</span>
                    <span id="jumlah-potret" class="text-amber-400 font-bold">0/20</span>
                </div>
            </div>

            <div class="flex justify-between items-center px-6 pb-6 z-30">
                <button onclick="pindahHalaman('sesi-potret', 'gallery')" class="w-14 h-14 rounded-2xl bg-zinc-900 border border-white/10 flex items-center justify-center active:scale-95 transition text-gray-400 hover:text-white">
                    <i data-lucide="image" class="w-6 h-6"></i>
                </button>
                
                <button onclick="prosesAmbilFoto()" class="w-20 h-20 bg-white rounded-full p-1.5 border-4 border-zinc-700 active:scale-90 transform transition duration-100 flex items-center justify-center">
                    <div class="w-full h-full bg-white rounded-full border-2 border-zinc-200"></div>
                </button>
                
                <div id="upload-indicator" class="w-14 h-14 flex items-center justify-center text-xs">
                    <i data-lucide="check-circle" class="w-7 h-7 text-green-400 hidden"></i>
                    <i data-lucide="loader-2" class="w-7 h-7 text-amber-400 animate-spin hidden"></i>
                </div>
            </div>
        </div>

        <div id="page-gallery" class="page-hidden flex flex-col justify-between h-full w-full z-10">
            <div class="flex justify-between items-center border-b border-white/10 pb-4">
                <div>
                    <p class="text-[9px] tracking-[0.2em] text-amber-500/80 font-wedding">THE WEDDING OF</p>
                    <h1 class="text-sm font-wedding tracking-widest text-amber-400 font-bold">Andi & Zaza</h1>
                </div>
                <span class="text-[10px] bg-white/5 border border-white/10 px-2.5 py-1 rounded-full text-amber-300 font-medium">RESULT!</span>
            </div>
            
            <div id="gallery-grid" class="grid grid-cols-3 gap-2 overflow-y-auto h-full my-4 py-1 custom-scroll">
                </div>
            
            <div class="flex justify-between items-center border-t border-white/10 pt-4 pb-2">
                <button onclick="pindahHalaman('gallery', 'sesi-potret')" class="flex items-center gap-1 text-[11px] font-semibold text-gray-400 hover:text-white transition">
                    <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> BACK
                </button>
                <button onclick="pindahHalaman('gallery', 'done-finish')" class="bg-amber-600 hover:bg-amber-700 text-white px-5 py-2 rounded-xl text-[11px] font-bold tracking-widest transition">
                    FINISH
                </button>
            </div>
        </div>

        <div id="page-result-single" class="page-hidden flex flex-col justify-between h-full w-full z-10">
            <div>
                <button onclick="pindahHalaman('result-single', 'gallery')" class="flex items-center gap-1 text-[11px] font-semibold text-gray-400 hover:text-white transition">
                    <i data-lucide="chevron-left" class="w-4 h-4"></i> BACK
                </button>
            </div>
            
            <div class="w-full flex-1 bg-zinc-900 rounded-[24px] overflow-hidden border border-white/10 my-4 flex items-center justify-center">
                <img id="img-single-view" class="w-full h-full object-contain" src="">
            </div>
            
            <div class="pb-4">
                <a id="btn-download" href="#" target="_blank" class="w-full bg-zinc-900 hover:bg-zinc-800 border border-white/10 text-white py-3 rounded-xl font-bold text-[11px] tracking-widest flex items-center justify-center gap-2 transition">
                    <i data-lucide="download" class="w-4 h-4"></i> DOWNLOAD
                </a>
            </div>
        </div>

        <div id="page-done-finish" class="page-hidden flex flex-col justify-center items-center h-full w-full text-center z-10 space-y-4">
            <div class="w-16 h-16 bg-amber-500/10 border border-amber-500/20 rounded-full flex items-center justify-center text-amber-400">
                <i data-lucide="heart" class="w-8 h-8 fill-amber-400"></i>
            </div>
            <div class="space-y-2">
                <h1 class="text-xl font-wedding tracking-widest text-amber-400 font-bold">Andi & Zaza</h1>
                <p class="text-[11px] text-gray-400 leading-relaxed px-4">Terima kasih sudah mengabadikan momen bersama kami.</p>
            </div>
            <button onclick="pindahHalaman('done-finish', 'sesi-potret')" class="border border-white/10 bg-white/5 text-white px-5 py-2.5 rounded-xl text-[11px] font-semibold tracking-wider transition">
                Ambil Foto Baru
            </button>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://plcrvnyfhczykdqrjhfs.supabase.co";
        const SUPABASE_KEY = "sb_publishable_vX_mEtYu3d9iq0CiUBuvyQ_r73lyg0B"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let mediaStream = null;
        let countPotret = 0;
        const LIMIT_FOTO = 20; 
        
        let modeFacing = "user"; 
        let modeFlash = "AUTO";  
        let jenisFilter = "BEAUTY"; 

        async function startKameraOtomatis() {
            lucide.createIcons();
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }

            // Memastikan aspek rasio kamera standar (tidak merusak resolusi hardware HP)
            const constraints = {
                video: {
                    facingMode: modeFacing,
                    width: { ideal: 1280 },
                    height: { ideal: 960 }
                },
                audio: false
            };

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                const videoElement = document.getElementById('video-potret');
                videoElement.srcObject = mediaStream;

                if (modeFacing === "user") {
                    videoElement.classList.add('mirror-view');
                } else {
                    videoElement.classList.remove('mirror-view');
                }
            }
