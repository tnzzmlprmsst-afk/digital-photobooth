<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Booth — Zuzu & Zaza</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#0C0C0E;color:#fff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

/* ── TOKENS ── */
:root{
  --void:#0C0C0E;
  --surface:#141418;
  --elevated:#1E1E26;
  --border:rgba(255,255,255,0.07);
  --border-hi:rgba(255,255,255,0.14);
  --ivory:#E8DCC8;
  --ivory-dim:rgba(232,220,200,0.5);
  --white:#FFFFFF;
  --muted:#6B6B7A;
  --red:#FF3B30;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}

/* ── LAYOUT ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:1;transition:opacity .18s ease}
.screen.hidden{opacity:0;pointer-events:none;display:none}

/* ── CAM PAGE ── */
#cam-page{background:var(--void)}

.cam-topbar{
  position:relative;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-top) + 14px) 20px 14px;
  background:linear-gradient(to bottom,rgba(12,12,14,0.9) 0%,transparent 100%);
}
.cam-topbar-title{font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}
.topbar-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.06);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .15s,transform .1s;color:var(--ivory);
}
.topbar-btn:active{transform:scale(.88);background:rgba(255,255,255,0.12)}
.topbar-btn.active{background:rgba(232,220,200,0.15);border-color:var(--ivory-dim);color:var(--ivory)}
.topbar-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Camera viewport */
#cam-viewport{
  position:relative;flex:1;overflow:hidden;
  background:#000;
}
#video-main{
  width:100%;height:100%;object-fit:cover;
  display:block;
}
.cam-vp-gradient-top{
  position:absolute;inset:0 0 auto 0;height:90px;
  background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);
  pointer-events:none;z-index:2;
}
.cam-vp-gradient-bot{
  position:absolute;inset:auto 0 0 0;height:200px;
  background:linear-gradient(to top,rgba(0,0,0,.65),transparent);
  pointer-events:none;z-index:2;
}

/* Filter strip — overlay di atas gradient bawah */
#filter-strip-wrap{
  position:absolute;bottom:88px;left:0;right:0;z-index:10;
  padding:0 16px 6px;
}
.filter-strip{
  display:flex;gap:9px;overflow-x:auto;padding:4px 2px 8px;
  scroll-snap-type:x mandatory;
  -ms-overflow-style:none;scrollbar-width:none;
}
.filter-strip::-webkit-scrollbar{display:none}
.filter-item{
  flex:0 0 auto;scroll-snap-align:start;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:transform .15s;
}
.filter-item:active{transform:scale(.92)}
.filter-thumb{
  width:52px;height:68px;border-radius:10px;overflow:hidden;
  position:relative;border:2px solid transparent;
  transition:border-color .2s,box-shadow .2s;
  background:#1a1a1f;
}
.filter-item.selected .filter-thumb{
  border-color:var(--ivory);
  box-shadow:0 0 0 1px rgba(232,220,200,0.25);
}
.filter-thumb video,.filter-thumb canvas{
  width:100%;height:100%;object-fit:cover;display:block;
}
.filter-thumb-label{
  position:absolute;bottom:0;left:0;right:0;
  padding:3px 4px 4px;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(4px);
  text-align:center;
  font-size:8px;font-weight:600;letter-spacing:.04em;
  color:#fff;line-height:1.2;
}
.filter-name{
  font-size:9px;font-weight:500;color:rgba(255,255,255,0.5);
  letter-spacing:.03em;white-space:nowrap;
  transition:color .2s;
}
.filter-item.selected .filter-name{color:var(--ivory)}

/* Bottom controls */
.cam-controls{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 28px calc(var(--safe-bot) + 24px);
}
.ctrl-side{width:56px;display:flex;align-items:center;justify-content:center}
.gallery-btn{
  width:48px;height:48px;border-radius:12px;
  background:rgba(255,255,255,0.07);border:1px solid var(--border-hi);
  overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .1s;
}
.gallery-btn:active{transform:scale(.88)}
.gallery-btn img{width:100%;height:100%;object-fit:cover}
.gallery-btn svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Shutter */
.shutter-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.shutter{
  width:72px;height:72px;border-radius:50%;
  background:transparent;
  border:3px solid rgba(255,255,255,0.85);
  padding:5px;cursor:pointer;
  transition:transform .12s,opacity .12s;
  position:relative;
}
.shutter:active .shutter-inner{transform:scale(.84)}
.shutter-inner{
  width:100%;height:100%;border-radius:50%;
  background:#FFFFFF;
  transition:transform .12s;
}

/* Counter badge — sebelah kanan shutter */
.counter-badge{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:48px;height:48px;border-radius:12px;
  background:rgba(255,255,255,0.06);border:1px solid var(--border);
}
.counter-num{font-size:16px;font-weight:800;color:#fff;line-height:1}
.counter-tot{font-size:9px;font-weight:500;color:var(--muted);line-height:1;margin-top:2px}

/* Flash overlay */
#flash-overlay{
  position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:9999;
  transition:opacity .06s;
}

/* ── GALLERY PAGE ── */
#gallery-page{background:var(--void);flex-direction:column}
.gallery-topbar{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:calc(var(--safe-top) + 20px) 24px 16px;
}
.gallery-title{font-size:26px;font-weight:900;letter-spacing:-.02em;color:#fff}
.gallery-sub{font-size:10px;font-weight:600;letter-spacing:.15em;color:var(--muted);margin-top:3px;text-transform:uppercase}
.wedding-name{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:var(--ivory);line-height:1.4}
.gallery-grid-wrap{flex:1;overflow-y:auto;padding:0 16px 8px;-ms-overflow-style:none;scrollbar-width:none}
.gallery-grid-wrap::-webkit-scrollbar{display:none}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.gallery-item{aspect-ratio:3/4;background:var(--elevated);overflow:hidden;cursor:pointer;position:relative;transition:opacity .1s}
.gallery-item:first-child{border-radius:12px 0 0 0}
.gallery-item:nth-child(3){border-radius:0 12px 0 0}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block}
.gallery-item:active{opacity:.75}
.gallery-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--muted)}
.gallery-empty svg{width:36px;height:36px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.gallery-empty p{font-size:12px;font-weight:500}
.gallery-botbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px calc(var(--safe-bot) + 20px);
  border-top:1px solid var(--border);
}
.ghost-btn{
  display:flex;align-items:center;gap:6px;background:none;border:none;
  font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--muted);cursor:pointer;
  text-transform:uppercase;transition:color .15s;
}
.ghost-btn:active{color:#fff}
.ghost-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.scan-btn{
  width:40px;height:40px;border-radius:10px;
  background:rgba(232,220,200,0.08);border:1px solid rgba(232,220,200,0.2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;transition:background .15s,transform .1s;
}
.scan-btn:active{transform:scale(.88);background:rgba(232,220,200,0.16)}
.scan-btn svg{width:18px;height:18px;stroke:var(--ivory);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.scan-btn span{font-size:7px;font-weight:700;letter-spacing:.1em;color:var(--ivory);text-transform:uppercase}
.primary-btn{
  background:var(--ivory);color:#0C0C0E;
  border:none;border-radius:10px;
  padding:11px 24px;font-size:11px;font-weight:800;
  letter-spacing:.1em;cursor:pointer;text-transform:uppercase;
  transition:opacity .15s,transform .1s;
}
.primary-btn:active{opacity:.8;transform:scale(.96)}

/* ── SINGLE VIEW ── */
#single-page{background:#000;flex-direction:column}
.single-topbar{
  display:flex;align-items:center;padding:calc(var(--safe-top)+14px) 20px 12px;
  background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
  position:absolute;top:0;left:0;right:0;z-index:10;
}
#single-img{width:100%;height:100%;object-fit:contain;display:block}
.single-botbar{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  padding:16px 20px calc(var(--safe-bot)+20px);
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
}
.dl-btn{
  width:100%;background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);backdrop-filter:blur(12px);
  border-radius:12px;padding:14px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:12px;font-weight:700;letter-spacing:.1em;color:#fff;
  cursor:pointer;transition:background .15s;text-transform:uppercase;
}
.dl-btn:active{background:rgba(255,255,255,0.18)}
.dl-btn svg{width:16px;height:16px;stroke:var(--ivory);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── FINISH PAGE ── */
#finish-page{background:var(--void);align-items:center;justify-content:center;gap:20px}
.finish-heart{
  width:64px;height:64px;border-radius:50%;
  background:rgba(232,220,200,0.06);border:1px solid rgba(232,220,200,0.15);
  display:flex;align-items:center;justify-content:center;
}
.finish-heart svg{width:28px;height:28px;fill:var(--ivory);stroke:none}
.finish-label{text-align:center}
.finish-label h1{font-family:'Playfair Display',serif;font-size:22px;font-style:italic;color:var(--ivory);margin-bottom:8px}
.finish-label p{font-size:11px;color:var(--muted);line-height:1.7;max-width:240px}
.outline-btn{
  background:transparent;border:1px solid var(--border-hi);
  border-radius:10px;padding:12px 28px;
  font-size:11px;font-weight:700;letter-spacing:.1em;color:#fff;
  cursor:pointer;text-transform:uppercase;transition:background .15s,transform .1s;
}
.outline-btn:active{background:rgba(255,255,255,.06);transform:scale(.96)}

/* ── FACE ID MODAL ── */
#faceid-modal{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.92);backdrop-filter:blur(16px);
  display:flex;flex-direction:column;align-items:center;
  padding:calc(var(--safe-top)+20px) 20px calc(var(--safe-bot)+20px);
  gap:16px;opacity:0;pointer-events:none;transition:opacity .2s;
}
#faceid-modal.open{opacity:1;pointer-events:all}
.fid-header{text-align:center}
.fid-header h2{font-size:13px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:#fff}
.fid-header p{font-size:11px;color:var(--muted);margin-top:4px;min-height:16px}
.fid-cam-wrap{
  position:relative;border-radius:20px;overflow:hidden;
  width:100%;max-width:340px;
  flex:1;max-height:440px;background:#111;
  border:1px solid var(--border-hi);
}
#fid-video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:block}
#fid-canvas{position:absolute;inset:0;width:100%;height:100%}
.fid-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;width:100%;max-width:340px}
.fid-badge{
  background:var(--elevated);border:1px solid var(--border-hi);
  border-radius:10px;padding:8px 12px;text-align:center;
  font-size:10px;color:var(--ivory);font-weight:600;line-height:1.6;
}
.fid-badge span{display:block;font-size:11px;font-weight:800;color:#fff}
.fid-badge small{font-size:9px;color:var(--muted);font-weight:500}
.fid-close{
  background:var(--elevated);border:1px solid var(--border-hi);border-radius:10px;
  padding:12px 32px;font-size:12px;font-weight:700;letter-spacing:.1em;
  color:#fff;cursor:pointer;text-transform:uppercase;transition:background .15s;
}
.fid-close:active{background:rgba(255,255,255,.1)}

/* ── UPLOAD TOAST ── */
#toast{
  position:fixed;bottom:calc(var(--safe-bot)+100px);left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--elevated);border:1px solid var(--border-hi);
  border-radius:20px;padding:8px 14px;
  display:flex;align-items:center;gap:8px;
  font-size:11px;font-weight:600;color:#fff;
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:800;
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
#toast.ok{color:#34C759}#toast.ok svg{stroke:#34C759}
#toast.loading{color:var(--ivory)}
@keyframes spin{to{transform:rotate(360deg)}}
#toast.loading svg{animation:spin .8s linear infinite}
</style>
</head>
<body>
<div id="flash-overlay"></div>

<!-- ══ CAM PAGE ══ -->
<div id="cam-page" class="screen">
  <div id="cam-viewport">
    <div class="cam-vp-gradient-top"></div>

    <!-- Top bar INSIDE viewport as overlay -->
    <div class="cam-topbar" style="position:absolute;top:0;left:0;right:0;z-index:20">
      <button class="topbar-btn" id="btn-flip" onclick="flipCamera()">
        <svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      </button>
      <span class="cam-topbar-title" id="cam-facing-label">Front</span>
      <button class="topbar-btn" id="btn-flash" onclick="cycleFlash()">
        <svg viewBox="0 0 24 24" id="flash-icon"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </button>
    </div>

    <video id="video-main" autoplay muted playsinline></video>

    <!-- Filter strip overlay -->
    <div id="filter-strip-wrap">
      <div class="filter-strip" id="filter-strip">
        <!-- Rendered by JS -->
      </div>
    </div>

    <div class="cam-vp-gradient-bot"></div>

    <!-- Bottom controls overlay -->
    <div class="cam-controls">
      <div class="ctrl-side">
        <div class="gallery-btn" onclick="goGallery()" id="gallery-thumb-btn">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
      </div>

      <div class="shutter-wrap">
        <div class="shutter" onclick="capturePhoto()" id="shutter-btn">
          <div class="shutter-inner"></div>
        </div>
      </div>

      <div class="ctrl-side">
        <div class="counter-badge">
          <span class="counter-num" id="counter-num">0</span>
          <span class="counter-tot" id="counter-tot">/ 20</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ GALLERY PAGE ══ -->
<div id="gallery-page" class="screen hidden">
  <div class="gallery-topbar">
    <div>
      <div class="gallery-title">Gallery</div>
      <div class="gallery-sub">Your moments</div>
    </div>
    <div style="display:flex;align-items:flex-start;gap:10px">
      <button class="scan-btn" onclick="openFaceID()" id="scan-btn">
        <svg viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        <span>Scan</span>
      </button>
      <div style="text-align:right">
        <div class="wedding-name">Zuzu</div>
        <div style="font-size:9px;color:var(--muted);margin:1px 0">&amp;</div>
        <div class="wedding-name">Zaza</div>
      </div>
    </div>
  </div>

  <div class="gallery-grid-wrap">
    <div class="gallery-grid" id="gallery-grid">
      <div class="gallery-empty" style="grid-column:1/-1;height:280px">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>No photos yet</p>
      </div>
    </div>
  </div>

  <div class="gallery-botbar">
    <button class="ghost-btn" onclick="goCamera()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <button class="primary-btn" onclick="goFinish()">Finish</button>
  </div>
</div>

<!-- ══ SINGLE PAGE ══ -->
<div id="single-page" class="screen hidden" style="position:relative">
  <div class="single-topbar">
    <button class="ghost-btn" onclick="goBack('single-page','gallery-page')">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
  </div>
  <img id="single-img" src="" alt="">
  <div class="single-botbar">
    <button class="dl-btn" onclick="downloadPhoto()">
      <svg viewBox="0 0 24 24"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg>
      Save Photo
    </button>
  </div>
</div>

<!-- ══ FINISH PAGE ══ -->
<div id="finish-page" class="screen hidden">
  <div class="finish-heart">
    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
  </div>
  <div class="finish-label">
    <h1>Zuzu & Zaza</h1>
    <p>Terima kasih sudah mengabadikan momen bersama kami.</p>
  </div>
  <button class="outline-btn" onclick="restartApp()">Take More Photos</button>
</div>

<!-- ══ FACE ID MODAL ══ -->
<div id="faceid-modal">
  <div class="fid-header">
    <h2>Face Scan</h2>
    <p id="fid-status">Initializing…</p>
  </div>
  <div class="fid-cam-wrap">
    <video id="fid-video" autoplay muted playsinline></video>
    <canvas id="fid-canvas"></canvas>
  </div>
  <div class="fid-badges" id="fid-badges"></div>
  <button class="fid-close" onclick="closeFaceID()">Close</button>
</div>

<!-- ══ TOAST ══ -->
<div id="toast">
  <svg id="toast-icon" viewBox="0 0 24 24"></svg>
  <span id="toast-msg">Uploading…</span>
</div>

<script>
/* ════════════════════════════════════════════
   SUPABASE
════════════════════════════════════════════ */
const SB_URL = "https://plcrvnyfhczykdqrjhfs.supabase.co";
const SB_KEY = "sb_publishable_vX_mEtYu3d9iq0CiUBuvyQ_r73lyg0B";
const sb = window.supabase.createClient(SB_URL, SB_KEY);

/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
let stream = null;
let count  = 0;
const MAX  = 20;
let facing = "user";      // "user" | "environment"
let flashMode = "auto";   // "auto" | "on" | "off"
let activeFilter = 0;     // index into FILTERS

/* ════════════════════════════════════════════
   FILTERS — 6 preset
════════════════════════════════════════════ */
const FILTERS = [
  {
    name:"None",
    css:"",
    canvas:"none",
    grain:false, vignette:false
  },
  {

/* ════════════════════════════════════════════
   CAMERA
════════════════════════════════════════════ */
const videoEl = document.getElementById('video-main');

async function startCamera() {
  if (stream) { stream.getTracks().forEach(t=>t.stop()); stream=null; }
  const constraints = {
    video:{ facingMode:{exact:facing}, width:{ideal:1280}, height:{ideal:960} },
    audio:false
  };
  try { stream = await navigator.mediaDevices.getUserMedia(constraints); }
  catch { 
    try { stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:facing},audio:false}); }
    catch(e){ console.error("Camera failed",e); return; }
  }
  videoEl.srcObject = stream;
  // mirror front, not back
  videoEl.style.transform = (facing==="user") ? "scaleX(-1)" : "scaleX(1)";
  applyFilter(activeFilter);
  renderFilterThumbs();
}

function flipCamera() {
  facing = (facing==="user") ? "environment" : "user";
  document.getElementById('cam-facing-label').textContent = facing==="user" ? "Front" : "Back";
  if (flashMode==="on" && facing!=="environment") torchOff();
  startCamera();
}

/* ════════════════════════════════════════════
   FLASH / TORCH
════════════════════════════════════════════ */
const FLASH_CYCLE = ["auto","on","off"];
const FLASH_LABELS = {auto:"Auto",on:"On",off:"Off"};
const FLASH_COLORS = {auto:"#E8DCC8",on:"#FF9F0A",off:"#6B6B7A"};

function cycleFlash() {
  const idx = FLASH_CYCLE.indexOf(flashMode);
  flashMode = FLASH_CYCLE[(idx+1)%3];
  const btn = document.getElementById('btn-flash');
  btn.style.color = FLASH_COLORS[flashMode];
  btn.classList.toggle('active', flashMode!=="off");
  document.getElementById('cam-facing-label').textContent = 
    facing==="user" ? "Front" : "Back"; // keep label
  if (flashMode==="on" && facing==="environment") torchOn();
  else torchOff();
}

async function torchOn() {
  if(!stream) return;
  const vt = stream.getVideoTracks()[0];
  const cap = vt.getCapabilities?.() || {};
  if(cap.torch) { try { await vt.applyConstraints({advanced:[{torch:true}]}); } catch{} }
}
async function torchOff() {
  if(!stream) return;
  const vt = stream.getVideoTracks()[0];
  const cap = vt.getCapabilities?.() || {};
  if(cap.torch) { try { await vt.applyConstraints({advanced:[{torch:false}]}); } catch{} }
}

/* ════════════════════════════════════════════
   FILTER
════════════════════════════════════════════ */
// Canvas elements per filter thumb for live preview
const thumbVideos = [];

function buildFilterStrip() {
  const strip = document.getElementById('filter-strip');
  strip.innerHTML = "";

  FILTERS.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = "filter-item" + (i===activeFilter ? " selected" : "");
    item.dataset.index = i;
    item.onclick = () => selectFilter(i);

    const thumb = document.createElement('div');
    thumb.className = "filter-thumb";

    // Live canvas preview from main video
    const cvs = document.createElement('canvas');
    cvs.width = 52; cvs.height = 68;
    cvs.style.cssText = "width:100%;height:100%;object-fit:cover;display:block;";
    if(f.css) cvs.style.filter = f.css;
    thumb.appendChild(cvs);
    thumbVideos.push(cvs);

    const label = document.createElement('div');
    label.className = "filter-thumb-label";
    label.textContent = f.name;
    thumb.appendChild(label);

    const name = document.createElement('div');
    name.className = "filter-name";
    name.textContent = f.name;

    item.appendChild(thumb);
    item.appendChild(name);
    strip.appendChild(item);
  });

  // Start thumb animation loop
  requestAnimationFrame(renderThumbs);
}

function renderThumbs() {
  if (!videoEl.srcObject || videoEl.readyState < 2) {
    requestAnimationFrame(renderThumbs);
    return;
  }
  thumbVideos.forEach((cvs, i) => {
    const ctx = cvs.getContext('2d');
    ctx.save();
    if (facing==="user") { ctx.translate(52,0); ctx.scale(-1,1); }
    ctx.drawImage(videoEl, 0, 0, 52, 68);
    ctx.restore();
  });
  requestAnimationFrame(renderThumbs);
}

function renderFilterThumbs() {
  // re-trigger after camera switch
}

function selectFilter(idx) {
  activeFilter = idx;
  applyFilter(idx);
  document.querySelectorAll('.filter-item').forEach((el,i)=>{
    el.classList.toggle('selected', i===idx);
  });
  // Scroll selected into view
  const items = document.querySelectorAll('.filter-item');
  if(items[idx]) items[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function applyFilter(idx) {
  const f = FILTERS[idx];
  videoEl.style.filter = f.css || "";
  // grain/vignette handled at capture time
}

/* ════════════════════════════════════════════
   CAPTURE
════════════════════════════════════════════ */
function capturePhoto() {
  const f = FILTERS[activeFilter];
  const isBack = facing === "environment";
  const doFlash = flashMode==="on" || (flashMode==="auto");

  if (doFlash) {
    if (isBack) {
      // Back camera: torch blink
      torchOn();
      setTimeout(() => {
        doCapture();
        setTimeout(torchOff, 150);
      }, 60);
    } else {
      // Front camera: white screen flash, blink effect
      const fl = document.getElementById('flash-overlay');
      fl.style.transition = "opacity 0.04s";
      fl.style.opacity = "1";
      setTimeout(() => {
        doCapture();
        fl.style.transition = "opacity 0.25s";
        fl.style.opacity = "0";
      }, 60);
    }
  } else {
    doCapture();
  }
}

async function doCapture() {
  if (count >= MAX) { showPage('gallery-page'); loadGallery(); return; }

  showToast('loading','Uploading…');

  const W = videoEl.videoWidth  || 640;
  const H = videoEl.videoHeight || 480;
  const cvs = document.createElement('canvas');
  cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');

  const f = FILTERS[activeFilter];

  ctx.save();
  // Front camera: mirror the captured image
  if (facing==="user") { ctx.translate(W,0); ctx.scale(-1,1); }
  ctx.filter = f.canvas || "none";
  ctx.drawImage(videoEl, 0,0,W,H);
  ctx.restore();

  // Grain
  if (f.grain) addGrain(ctx, W, H, 18);
  // Vignette
  if (f.vignette) addVignette(ctx, W, H);

  cvs.toBlob(async blob => {
    if(!blob){ showToast('ok','Failed'); return; }
    const name = `photo_${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
    const { error } = await sb.storage.from('galeri-foto').upload(name, blob, {contentType:'image/jpeg'});
    if(error){ showToast('ok','Upload failed'); return; }

    count++;
    document.getElementById('counter-num').textContent = count;

    showToast('ok','Saved ✓');
    if(count >= MAX) { setTimeout(()=>{ showPage('gallery-page'); loadGallery(); }, 600); }
  }, 'image/jpeg', 0.92);
}

function addGrain(ctx, w, h, intensity) {
  const img = ctx.getImageData(0,0,w,h);
  const d = img.data;
  for(let i=0;i<d.length;i+=4){
    const n = (Math.random()-.5)*intensity;
    d[i]   = Math.max(0,Math.min(255,d[i]+n));
    d[i+1] = Math.max(0,Math.min(255,d[i+1]+n));
    d[i+2] = Math.max(0,Math.min(255,d[i+2]+n));
  }
  ctx.putImageData(img,0,0);
}

function addVignette(ctx, w, h) {
  const g = ctx.createRadialGradient(w/2,h/2,h*.3,w/2,h/2,h*.72);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,.52)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,w,h);
}

/* ════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════ */
function showPage(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function goGallery() {
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  showPage('gallery-page');
  loadGallery();
}

function goCamera() {
  count = 0;
  document.getElementById('counter-num').textContent = '0';
  showPage('cam-page');
  startCamera();
}

function goBack(from, to) {
  showPage(to);
}

function goFinish() {
  showPage('finish-page');
}

function restartApp() {
  count = 0;
  document.getElementById('counter-num').textContent = '0';
  showPage('cam-page');
  startCamera();
}

/* ════════════════════════════════════════════
   GALLERY
════════════════════════════════════════════ */
async function loadGallery() {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = `<div class="gallery-empty" style="grid-column:1/-1;height:280px"><p style="color:var(--muted);font-size:12px;animation:pulse 1.5s infinite">Loading…</p></div>`;

  const { data, error } = await sb.storage.from('galeri-foto').list('',{limit:60,sortBy:{column:'created_at',order:'desc'}});
  if(error||!data||!data.length){
    grid.innerHTML=`<div class="gallery-empty" style="grid-column:1/-1;height:280px"><p>No photos yet</p></div>`;
    return;
  }
  grid.innerHTML = "";
  data.filter(f=>f.name!=='.emptyFolderPlaceholder').forEach(file => {
    const {data:pu} = sb.storage.from('galeri-foto').getPublicUrl(file.name);
    const el = document.createElement('div');
    el.className = "gallery-item";
    el.innerHTML = `<img src="${pu.publicUrl}" loading="lazy">`;
    el.onclick = () => {
      document.getElementById('single-img').src = pu.publicUrl;
      showPage('single-page');
    };
    grid.appendChild(el);
  });

  // Update gallery thumb btn
  const first = data.find(f=>f.name!=='.emptyFolderPlaceholder');
  if(first){
    const {data:pu} = sb.storage.from('galeri-foto').getPublicUrl(first.name);
    const btn = document.getElementById('gallery-thumb-btn');
    btn.innerHTML = `<img src="${pu.publicUrl}">`;
  }
}

/* ════════════════════════════════════════════
   DOWNLOAD
════════════════════════════════════════════ */
async function downloadPhoto() {
  const url = document.getElementById('single-img').src;
  if(!url) return;
  try {
    const r = await fetch(url);
    const b = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = `booth_${Date.now()}.jpg`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),200);
  } catch { window.open(url,'_blank'); }
}

/* ════════════════════════════════════════════
   TOAST
════════════════════════════════════════════ */
let toastTimer;
function showToast(type, msg) {
  const t = document.getElementById('toast');
  const icon = document.getElementById('toast-icon');
  const label = document.getElementById('toast-msg');
  t.className = `show ${type}`;
  label.textContent = msg;
  if(type==='loading'){
    icon.innerHTML = `<circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="30" stroke="currentColor" stroke-width="2" fill="none"/>`;
  } else {
    icon.innerHTML = `<polyline points="20 6 9 17 4 12"/>`;
  }
  clearTimeout(toastTimer);
  if(type!=='loading') toastTimer = setTimeout(()=>{ t.className=""; },1800);
}

/* ════════════════════════════════════════════
   FACE ID
════════════════════════════════════════════ */
// Use raw.githubusercontent.com — confirmed 200
const MODEL_URL = "https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights";
let fidLoaded = false;
let fidStream = null;
let fidRaf = null;

async function loadFaceModels() {
  if(fidLoaded) return true;
  document.getElementById('fid-status').textContent = "Loading AI models…";
  try {
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
      faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
      faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL)
    ]);
    fidLoaded = true;
    return true;
  } catch(e) {
    console.error(e);
    document.getElementById('fid-status').textContent = "Failed to load models.";
    return false;
  }
}

async function openFaceID() {
  document.getElementById('faceid-modal').classList.add('open');
  document.getElementById('fid-badges').innerHTML = "";
  document.getElementById('fid-status').textContent = "Loading AI models…";

  const ok = await loadFaceModels();
  if(!ok) return;

  document.getElementById('fid-status').textContent = "Starting camera…";
  try {
    fidStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"user",width:{ideal:640},height:{ideal:480}},audio:false
    });
  } catch {
    document.getElementById('fid-status').textContent = "Camera access denied.";
    return;
  }

  const video = document.getElementById('fid-video');
  video.srcObject = fidStream;
  await video.play();

  document.getElementById('fid-status').textContent = "Scanning for faces…";
  runFaceDetection();
}

async function runFaceDetection() {
  const video  = document.getElementById('fid-video');
  const canvas = document.getElementById('fid-canvas');
  const wrap   = canvas.parentElement;
  canvas.width  = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;

  const detect = async () => {
    if(!fidStream) return;

    const results = await faceapi
      .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({inputSize:320,scoreThreshold:0.45}))
      .withFaceLandmarks(true)
      .withFaceExpressions()
      .withAgeAndGender();

    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(!results.length){
      document.getElementById('fid-status').textContent = "No faces detected…";
      document.getElementById('fid-badges').innerHTML = "";
      fidRaf = requestAnimationFrame(detect);
      return;
    }

    const sx = canvas.width  / video.videoWidth;
    const sy = canvas.height / video.videoHeight;

    ctx.save();
    // Mirror canvas to match mirrored video
    ctx.translate(canvas.width,0);
    ctx.scale(-1,1);

    results.forEach(det => {
      const b  = det.detection.box;
      const bx = b.x*sx, by=b.y*sy, bw=b.width*sx, bh=b.height*sy;

      // Box
      ctx.strokeStyle = "rgba(232,220,200,0.8)";
      ctx.lineWidth   = 1.5;
      ctx.strokeRect(bx,by,bw,bh);

      // Corners
      const cs = 12;
      ctx.strokeStyle = "#E8DCC8";
      ctx.lineWidth   = 2.5;
      [
        [bx,by,1,1],[bx+bw,by,-1,1],
        [bx,by+bh,1,-1],[bx+bw,by+bh,-1,-1]
      ].forEach(([cx,cy,dx,dy])=>{
        ctx.beginPath();
        ctx.moveTo(cx+dx*cs,cy);
        ctx.lineTo(cx,cy);
        ctx.lineTo(cx,cy+dy*cs);
        ctx.stroke();
      });

      // Landmarks
      ctx.fillStyle = "rgba(232,220,200,.55)";
      det.landmarks.positions.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x*sx,p.y*sy,1.4,0,Math.PI*2);
        ctx.fill();
      });
    });
    ctx.restore();

    // Badges
    const EXP_MAP = {happy:"Happy",sad:"Sad",angry:"Angry",fearful:"Fearful",disgusted:"Disgusted",surprised:"Surprised",neutral:"Neutral"};
    const badges = document.getElementById('fid-badges');
    badges.innerHTML = "";
    document.getElementById('fid-status').textContent = `${results.length} face${results.length>1?'s':''} detected`;

    results.forEach((det,i)=>{
      const g   = det.gender==="male"?"Male":"Female";
      const age = Math.round(det.age);
      const top = Object.entries(det.expressions).sort((a,b)=>b[1]-a[1])[0];
      const exp = EXP_MAP[top[0]] || top[0];
      const el  = document.createElement('div');
      el.className = "fid-badge";
      el.innerHTML = `<span>#${i+1} · ${g}, ~${age} yrs</span><small>${exp}</small>`;
      badges.appendChild(el);
    });

    fidRaf = requestAnimationFrame(detect);
  };

  fidRaf = requestAnimationFrame(detect);
}

function closeFaceID() {
  cancelAnimationFrame(fidRaf); fidRaf=null;
  if(fidStream){ fidStream.getTracks().forEach(t=>t.stop()); fidStream=null; }
  const v = document.getElementById('fid-video');
  v.srcObject = null;
  const c = document.getElementById('fid-canvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
  document.getElementById('fid-badges').innerHTML = "";
  document.getElementById('faceid-modal').classList.remove('open');
}
