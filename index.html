<!DOCTYPE html>
<html lang="id" class="w-full h-full m-0 p-0 overflow-hidden select-none touch-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Digital Photobooth</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- face-api.js untuk Face ID -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');
        body { 
            background-color: #0A0A0A; 
            font-family: 'Montserrat', sans-serif; 
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .font-wedding { font-family: 'Cinzel', serif; }
        .page-hidden { display: none !important; }
        
        .mirror-view { transform: scaleX(-1); }
        
        /* CSS Filters untuk video preview */
        .filter-beauty  { filter: contrast(104%) brightness(106%) saturate(103%); }
        .filter-bw      { filter: grayscale(100%) contrast(120%); }
        .filter-sepia   { filter: sepia(70%) contrast(95%) brightness(100%); }
        /* Vintage / Disposable camera: faded, warm, low-sat */
        .filter-vintage { filter: sepia(40%) contrast(85%) brightness(105%) saturate(70%) hue-rotate(5deg); }

        /* Grain overlay untuk Vintage */
        .grain-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.3s;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.18'/%3E%3C/svg%3E");
            mix-blend-mode: multiply;
            z-index: 10;
        }
        .grain-overlay.visible { opacity: 1; }

        /* Vignette vintage */
        .vignette-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.3s;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(30,10,0,0.55) 100%);
            z-index: 11;
        }
        .vignette-overlay.visible { opacity: 1; }

        /* Face ID overlay */
        #faceid-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        #faceid-overlay.page-hidden { display: none !important; }

        #faceid-canvas-wrap {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            border: 1.5px solid rgba(226,199,153,0.3);
            width: min(88vw, 360px);
            aspect-ratio: 3/4;
            background: #111;
        }
        #faceid-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        #faceid-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .custom-scroll::-webkit-scrollbar { width: 0px; }

        /* Pulse ring animasi Face ID */
        @keyframes ring-pulse {
            0% { box-shadow: 0 0 0 0 rgba(226,199,153,0.5); }
            70% { box-shadow: 0 0 0 14px rgba(226,199,153,0); }
            100% { box-shadow: 0 0 0 0 rgba(226,199,153,0); }
        }
        .btn-faceid-active { animation: ring-pulse 1.2s infinite; }
    </style>
</head>
<body class="w-full h-full m-0 p-0 overflow-hidden flex justify-center items-center">

    <!-- OVERLAY FLASH NYATA -->
    <div id="flash-overlay" class="fixed inset-0 bg-white opacity-0 pointer-events-none z-[9999] transition-opacity duration-75"></div>

    <!-- Container Utama -->
    <div class="w-full h-full bg-[#0A0A0A] relative overflow-hidden flex flex-col justify-between text-white p-6 pt-10">
        
        <!-- ======== PAGE 1: SESI POTRET ======== -->
        <div id="page-sesi-potret" class="flex flex-col justify-between h-full w-full relative z-10">
            <!-- Header Toolbar Atas -->
            <div class="flex justify-between items-center px-4 py-2 bg-zinc-900/50 rounded-2xl backdrop-blur-sm z-30">
                <button onclick="toggleKamera()" class="flex flex-col items-center gap-1 text-[10px] font-medium tracking-widest text-gray-400 hover:text-white transition active:scale-95">
                    <i data-lucide="refresh-cw" class="w-4 h-4 text-[#E2C799]"></i>
                    <span id="text-kamera">FRONT</span>
                </button>
                <button onclick="toggleFlash()" class="flex flex-col items-center gap-1 text-[10px] font-medium tracking-widest text-gray-400 hover:text-white transition active:scale-95">
                    <i data-lucide="zap" id="icon-flash" class="w-4 h-4 text-[#E2C799]"></i>
                    <span id="text-flash">AUTO</span>
                </button>
                <button onclick="toggleFilter()" class="flex flex-col items-center gap-1 text-[10px] font-medium tracking-widest text-gray-400 hover:text-white transition active:scale-95">
                    <i data-lucide="aperture" class="w-4 h-4 text-[#E2C799]"></i>
                    <span id="text-filter">BEAUTY</span>

            <!-- Jendela Kamera -->
            <div class="w-full aspect-[3/4] my-auto rounded-[32px] overflow-hidden bg-zinc-900 relative border border-white/5 shadow-2xl flex items-center justify-center">
                <video id="video-potret" class="w-full h-full object-cover mirror-view filter-beauty" autoplay muted playsinline></video>
                <!-- Grain & Vignette untuk vintage (hidden saat filter lain) -->
                <div id="grain-overlay" class="grain-overlay"></div>
                <div id="vignette-overlay" class="vignette-overlay"></div>
            </div>

            <!-- Tombol Kontrol Bawah — counter DISAMPING shutter -->
            <div class="flex justify-between items-center px-6 pb-6 z-30">
                <!-- Gallery -->
                <button onclick="pindahHalaman('sesi-potret', 'gallery')" class="w-14 h-14 rounded-2xl bg-zinc-900 border border-white/10 flex items-center justify-center active:scale-95 transition text-gray-400 hover:text-white">
                    <i data-lucide="image" class="w-6 h-6"></i>

                <!-- Shutter + Counter di kiri shutter -->
                <div class="flex items-center gap-3">
                    <!-- Counter sebelah kiri shutter -->
                    <div class="flex flex-col items-center justify-center bg-zinc-900/80 border border-white/10 rounded-2xl px-3 py-2 min-w-[52px]">
                        <span id="jumlah-potret" class="text-[#E2C799] font-black text-base leading-none">0</span>
                        <span class="text-zinc-500 text-[9px] tracking-widest mt-0.5">/<span id="limit-label">20</span></span>
                    </div>
                    <!-- Shutter -->
                    <button onclick="prosesAmbilFoto()" class="w-20 h-20 bg-white rounded-full p-1.5 border-4 border-zinc-700 active:scale-90 transform transition duration-100 flex items-center justify-center">
                        <div class="w-full h-full bg-white rounded-full border-2 border-zinc-200"></div>

                <!-- Upload status -->
                <div id="upload-indicator" class="w-14 h-14 flex items-center justify-center text-xs">
                    <i data-lucide="check-circle" class="w-7 h-7 text-green-400 hidden"></i>
                    <i data-lucide="loader-2" class="w-7 h-7 text-[#E2C799] animate-spin hidden"></i>

            </div>

        <!-- ======== PAGE 2: GALLERY ======== -->
        <div id="page-gallery" class="page-hidden flex flex-col justify-between h-full w-full z-10">
            <div class="flex justify-between items-start pt-2 pb-4">
                <div class="flex flex-col gap-2">
                    <h1 class="text-2xl font-black tracking-wider text-white">RESULT!</h1>
                    <button onclick="mulaiScanFaceID()" id="btn-scan-faceid" class="w-12 h-12 border border-[#E2C799]/40 bg-zinc-900/80 rounded-xl flex flex-col items-center justify-center active:scale-95 transition gap-0.5 shadow-md">
                        <i data-lucide="scan-face" class="w-5 h-5 text-[#E2C799]"></i>
                        <span class="text-[8px] font-bold text-[#E2C799] tracking-tighter">SCAN</span>
                    </button>
                </div>
                <div class="text-right">
                    <p class="text-base font-wedding tracking-widest text-[#E2C799] font-bold leading-tight">Zuzu</p>
                    <p class="text-[10px] font-wedding text-[#E2C799]/70 my-0.5">&</p>
                    <p class="text-base font-wedding tracking-widest text-[#E2C799] font-bold leading-tight">Zaza</p>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto my-2 pr-1 custom-scroll">
                <div id="gallery-grid" class="grid grid-cols-3 gap-2.5 auto-rows-max w-full"></div>
            </div>
            
            <div class="flex justify-between items-center border-t border-white/10 pt-4 pb-2 mt-2">
                <button onclick="pindahHalaman('gallery', 'sesi-potret')" class="flex items-center gap-1.5 text-xs font-bold tracking-widest text-gray-400 hover:text-white transition">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> BACK
                </button>
                <button onclick="pindahHalaman('gallery', 'done-finish')" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-xl text-xs font-bold tracking-widest transition shadow-lg shadow-amber-900/20">
                    FINISH
                </button>
            </div>
        </div>

        <!-- ======== PAGE 3: RESULT SINGLE VIEW ======== -->
        <div id="page-result-single" class="page-hidden flex flex-col justify-between h-full w-full z-10">
            <div class="pt-2">
                <button onclick="pindahHalaman('result-single', 'gallery')" class="flex items-center gap-1 text-xs font-bold tracking-wider text-gray-400 hover:text-white transition">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i> BACK

            <div class="w-full flex-1 bg-zinc-900/40 rounded-[28px] overflow-hidden border border-white/10 my-4 flex items-center justify-center p-2">
                <img id="img-single-view" class="w-full h-full object-contain rounded-2xl" src="">
            </div>
            <div class="pb-4">
                <button onclick="jalankanProsesUnduh()" class="w-full bg-zinc-900 hover:bg-zinc-800 border border-white/10 text-white py-3.5 rounded-xl font-bold text-xs tracking-widest flex items-center justify-center gap-2 transition">
                    <i data-lucide="download" class="w-4 h-4 text-[#E2C799]"></i> DOWNLOAD PHOTO
                </button>
            </div>
        </div>

        <!-- ======== PAGE 4: DONE FINISH ======== -->
        <div id="page-done-finish" class="page-hidden flex flex-col justify-center items-center h-full w-full text-center z-10 space-y-4">
            <div class="w-16 h-16 bg-amber-500/10 border border-amber-500/20 rounded-full flex items-center justify-center text-amber-400">
                <i data-lucide="heart" class="w-8 h-8 fill-amber-400"></i>
            </div>
            <div class="space-y-2">
                <h1 class="text-xl font-wedding tracking-widest text-[#E2C799] font-bold">Zuzu & Zaza</h1>
                <p class="text-[11px] text-gray-400 leading-relaxed px-4">Terima kasih sudah mengabadikan momen bersama kami.</p>
            </div>
            <button onclick="pindahHalaman('done-finish', 'sesi-potret')" class="border border-white/10 bg-white/5 text-white px-5 py-2.5 rounded-xl text-[11px] font-semibold tracking-wider transition">
                Ambil Foto Baru
            </button>
        </div>
    </div>

    <!-- ======== FACE ID OVERLAY ======== -->
    <div id="faceid-overlay" class="page-hidden">
        <div class="text-center space-y-1">
            <p class="font-wedding text-[#E2C799] text-lg font-bold tracking-widest">FACE ID</p>
            <p id="faceid-status" class="text-xs text-gray-400 tracking-widest">Mendeteksi wajah...</p>
        </div>
        <div id="faceid-canvas-wrap">
            <video id="faceid-video" autoplay muted playsinline></video>
            <canvas id="faceid-canvas"></canvas>
        </div>
        <!-- Info badges -->
        <div id="faceid-badges" class="flex gap-2 flex-wrap justify-center px-4"></div>
        <button onclick="tutupFaceID()" class="mt-2 border border-white/10 bg-white/5 text-white px-6 py-2.5 rounded-xl text-xs font-semibold tracking-widest transition active:scale-95">
            TUTUP
        </button>
    </div>

    <script>
        /* ============================================================
           SUPABASE SETUP
        ============================================================ */
        const SUPABASE_URL = "https://plcrvnyfhczykdqrjhfs.supabase.co";
        const SUPABASE_KEY = "sb_publishable_vX_mEtYu3d9iq0CiUBuvyQ_r73lyg0B";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        /* ============================================================
           STATE
        ============================================================ */
        let mediaStream = null;
        let countPotret = 0;
        const LIMIT_FOTO = 20;

        let modeFacing = "user";
        let modeFlash  = "AUTO";
        let jenisFilter = "BEAUTY";

        // Urutan filter: BEAUTY → BW → SEPIA → VINTAGE → kembali BEAUTY
        const FILTER_CYCLE = ["BEAUTY", "BW", "SEPIA", "VINTAGE"];
        const FILTER_LABELS = { BEAUTY:"BEAUTY", BW:"B&W", SEPIA:"SEPIA", VINTAGE:"VINTAGE" };
        const FILTER_CSS    = {
            BEAUTY:  "filter-beauty",
            BW:      "filter-bw",
            SEPIA:   "filter-sepia",
            VINTAGE: "filter-vintage"
        };
        // CSS canvas filter (untuk capture)
        const FILTER_CANVAS = {
            BEAUTY:  "contrast(104%) brightness(106%) saturate(103%)",
            BW:      "grayscale(100%) contrast(120%)",
            SEPIA:   "sepia(70%) contrast(95%) brightness(100%)",
            VINTAGE: "sepia(40%) contrast(85%) brightness(105%) saturate(70%) hue-rotate(5deg)"
        };

        /* ============================================================
           KAMERA
        ============================================================ */
        async function startKameraOtomatis() {
            lucide.createIcons();
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            const constraints = {
                video: { facingMode: { exact: modeFacing }, width: { ideal: 1280 }, height: { ideal: 960 } },
                audio: false
            };
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
            } catch {
                try {
                    mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: modeFacing }, audio: false });
                } catch(e) { console.error("Kamera gagal:", e); return; }
            }
            document.getElementById('video-potret').srcObject = mediaStream;
        }
        window.addEventListener('DOMContentLoaded', startKameraOtomatis);

        async function toggleKamera() {
            modeFacing = (modeFacing === "user") ? "environment" : "user";
            document.getElementById('text-kamera').innerText = (modeFacing === "user") ? "FRONT" : "BACK";
            await startKameraOtomatis();
        }

        /* ============================================================
           FLASH — termasuk Torch untuk kamera belakang
        ============================================================ */
        async function setTorch(active) {
            if (!mediaStream) return;
            const videoTrack = mediaStream.getVideoTracks()[0];
            if (!videoTrack) return;
            const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
            if (capabilities.torch) {
                try {
                    await videoTrack.applyConstraints({ advanced: [{ torch: active }] });
                } catch(e) { console.warn("Torch tidak didukung:", e); }
            }
        }

        function toggleFlash() {
            const label = document.getElementById('text-flash');
            const icon  = document.getElementById('icon-flash');
            const idx   = ["AUTO","ON","OFF"].indexOf(modeFlash);
            modeFlash   = ["AUTO","ON","OFF"][(idx + 1) % 3];
            label.innerText = modeFlash;
            if (modeFlash === "ON") {
                icon.className = "w-4 h-4 text-orange-400";
                if (modeFacing === "environment") setTorch(true);
            } else if (modeFlash === "OFF") {
                icon.className = "w-4 h-4 text-zinc-500";
                if (modeFacing === "environment") setTorch(false);
            } else {
                icon.className = "w-4 h-4 text-[#E2C799]";
                if (modeFacing === "environment") setTorch(false);
            }
        }

        /* ============================================================
           FILTER (4 pilihan termasuk VINTAGE)
        ============================================================ */
        function applyVideoFilter(filter) {
            const video = document.getElementById('video-potret');
            FILTER_CYCLE.forEach(f => video.classList.remove(FILTER_CSS[f]));
            video.classList.add(FILTER_CSS[filter]);

            const grain    = document.getElementById('grain-overlay');
            const vignette = document.getElementById('vignette-overlay');
            if (filter === "VINTAGE") {
                grain.classList.add('visible');
                vignette.classList.add('visible');
            } else {
                grain.classList.remove('visible');
                vignette.classList.remove('visible');
            }
        }

        function toggleFilter() {
            const idx = FILTER_CYCLE.indexOf(jenisFilter);
            jenisFilter = FILTER_CYCLE[(idx + 1) % FILTER_CYCLE.length];
            document.getElementById('text-filter').innerText = FILTER_LABELS[jenisFilter];
            applyVideoFilter(jenisFilter);
        }

        /* ============================================================
           NAVIGASI HALAMAN
        ============================================================ */
        async function pindahHalaman(dari, ke) {
            document.getElementById(`page-${dari}`).classList.add('page-hidden');
            document.getElementById(`page-${ke}`).classList.remove('page-hidden');
            lucide.createIcons();

            if (dari === 'sesi-potret' && mediaStream) {
                setTorch(false); // matikan torch saat keluar
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            if (ke === 'sesi-potret') {
                countPotret = 0;
                updateCounter();
                await startKameraOtomatis();
                applyVideoFilter(jenisFilter);
            } else if (ke === 'gallery') {
                ambilSemuaFotoDariDatabase();
            }
        }

        function updateCounter() {
            document.getElementById('jumlah-potret').innerText = countPotret;
            document.getElementById('limit-label').innerText   = LIMIT_FOTO;
        }

        /* ============================================================
           AMBIL FOTO
        ============================================================ */
        function prosesAmbilFoto() {
            if (countPotret >= LIMIT_FOTO) {
                pindahHalaman('sesi-potret', 'gallery');
                return;
            }

            const shouldFlash = (modeFlash === "ON") || (modeFlash === "AUTO");
            const isBackCam   = (modeFacing === "environment");

            if (shouldFlash) {
                if (isBackCam) {
                    // Kamera belakang: torch nyala sebentar
                    setTorch(true);
                    setTimeout(() => {
                        jepretDanUpload();
                        setTimeout(() => setTorch(false), 200);
                    }, 80);
                } else {
                    // Kamera depan: layar putih
                    const flash = document.getElementById('flash-overlay');
                    flash.style.opacity = "1";
                    setTimeout(() => {
                        jepretDanUpload();
                        setTimeout(() => { flash.style.opacity = "0"; }, 100);
                    }, 50);
                }
            } else {
                jepretDanUpload();
            }
        }

        async function jepretDanUpload() {
            const video  = document.getElementById('video-potret');
            const loader = document.getElementById('upload-indicator');
            loader.querySelector('[data-lucide="loader-2"]').classList.remove('hidden');

            const canvas = document.createElement('canvas');
            canvas.width  = video.videoWidth  || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');

            ctx.save();
            if (modeFacing === "user") {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.filter = FILTER_CANVAS[jenisFilter] || "none";
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            // Tumpuk grain untuk VINTAGE saat capture
            if (jenisFilter === "VINTAGE") {
                applyVintageGrainToCanvas(ctx, canvas.width, canvas.height);
            }

            canvas.toBlob(async (blob) => {
                if (!blob) { loader.querySelector('[data-lucide="loader-2"]').classList.add('hidden'); return; }
                const namaFile = `photo_${Date.now()}_${Math.random().toString(36).substring(5)}.jpg`;
                const { data, error } = await supabaseClient.storage.from('galeri-foto').upload(namaFile, blob, { contentType: 'image/jpeg' });

                loader.querySelector('[data-lucide="loader-2"]').classList.add('hidden');
                if (error) { console.error(error); return; }

                const centang = loader.querySelector('[data-lucide="check-circle"]');
                centang.classList.remove('hidden');
                setTimeout(() => centang.classList.add('hidden'), 900);

                countPotret++;
                updateCounter();
                if (countPotret >= LIMIT_FOTO) pindahHalaman('sesi-potret', 'gallery');
            }, 'image/jpeg', 0.9);
        }

        // Menambahkan grain noise pada canvas untuk filter Vintage
        function applyVintageGrainToCanvas(ctx, w, h) {
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;
            const intensity = 22;
            for (let i = 0; i < data.length; i += 4) {
                const noise = (Math.random() - 0.5) * intensity;
                data[i]     = Math.min(255, Math.max(0, data[i]     + noise));
                data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + noise));
                data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + noise));
            }
            ctx.putImageData(imageData, 0, 0);
            // Vignette tipis
            const vg = ctx.createRadialGradient(w/2, h/2, h*0.35, w/2, h/2, h*0.75);
            vg.addColorStop(0, 'rgba(0,0,0,0)');
            vg.addColorStop(1, 'rgba(20,5,0,0.48)');
            ctx.fillStyle = vg;
            ctx.fillRect(0, 0, w, h);
        }

        /* ============================================================
           GALLERY
        ============================================================ */
        async function ambilSemuaFotoDariDatabase() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = "<div class='text-center col-span-3 py-20 text-xs text-zinc-600 animate-pulse'>Loading Gallery...</div>";

            const { data: daftarFile, error } = await supabaseClient.storage.from('galeri-foto').list('', {
                limit: 40, sortBy: { column: 'created_at', order: 'desc' }
            });

            if (error || !daftarFile || daftarFile.length === 0) {
                grid.innerHTML = "<div class='text-center col-span-3 py-20 text-xs text-zinc-600'>Empty gallery</div>";
                return;
            }

            grid.innerHTML = "";
            daftarFile.forEach(file => {
                if (file.name === '.emptyFolderPlaceholder') return;
                const { data } = supabaseClient.storage.from('galeri-foto').getPublicUrl(file.name);
                const kotak = document.createElement('div');
                kotak.className = "w-full aspect-square bg-zinc-900 rounded-2xl overflow-hidden border border-white/5 active:scale-95 transition shadow-md relative block";
                kotak.onclick = () => {
                    document.getElementById('img-single-view').src = data.publicUrl;
                    pindahHalaman('gallery', 'result-single');
                };
                kotak.innerHTML = `<img src="${data.publicUrl}" class="w-full h-full object-cover pointer-events-none">`;
                grid.appendChild(kotak);
            });
        }

        /* ============================================================
           DOWNLOAD
        ============================================================ */
        async function jalankanProsesUnduh() {
            const urlGambar = document.getElementById('img-single-view').src;
            if (!urlGambar) return;
            try {
                const response = await fetch(urlGambar);
                const blob = await response.blob();
                const urlBlob = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = urlBlob;
                a.download = `booth_${Date.now()}.jpg`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(urlBlob); }, 150);
            } catch {
                window.open(urlGambar, '_blank');
            }
        }

        /* ============================================================
           FACE ID — menggunakan face-api.js NYATA
        ============================================================ */
        let faceIDStream    = null;
        let faceIDInterval  = null;
        let faceAPILoaded   = false;

        const MODEL_URL = "https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights";

        async function loadFaceAPIModels() {
            if (faceAPILoaded) return true;
            try {
                document.getElementById('faceid-status').innerText = "Memuat model AI...";
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
                    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
                    faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL)
                ]);
                faceAPILoaded = true;
                return true;
            } catch(e) {
                console.error("Gagal memuat model face-api:", e);
                document.getElementById('faceid-status').innerText = "Model gagal dimuat.";
                return false;
            }
        }

        async function mulaiScanFaceID() {
            const overlay = document.getElementById('faceid-overlay');
            overlay.classList.remove('page-hidden');
            document.getElementById('faceid-status').innerText = "Memuat model AI...";
            document.getElementById('faceid-badges').innerHTML = "";

            const btn = document.getElementById('btn-scan-faceid');
            btn.classList.add('btn-faceid-active');

            const ok = await loadFaceAPIModels();
            if (!ok) return;

            // Mulai kamera Face ID
            try {
                faceIDStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
            } catch(e) {
                document.getElementById('faceid-status').innerText = "Akses kamera ditolak.";
                return;
            }

            const video  = document.getElementById('faceid-video');
            const canvas = document.getElementById('faceid-canvas');
            video.srcObject = faceIDStream;
            await video.play();

            document.getElementById('faceid-status').innerText = "Mendeteksi wajah...";

            faceIDInterval = setInterval(async () => {
                const wrap = document.getElementById('faceid-canvas-wrap');
                canvas.width  = wrap.offsetWidth;
                canvas.height = wrap.offsetHeight;

                const detections = await faceapi
                    .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
                    .withFaceLandmarks(true)
                    .withFaceExpressions()
                    .withAgeAndGender();

                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (!detections || detections.length === 0) {
                    document.getElementById('faceid-status').innerText = "Tidak ada wajah terdeteksi...";
                    document.getElementById('faceid-badges').innerHTML = "";
                    return;
                }

                // Skala hasil deteksi ke ukuran canvas
                const scaleX = canvas.width  / video.videoWidth;
                const scaleY = canvas.height / video.videoHeight;

                // Mirror horizontal (video di-mirror di CSS)
                ctx.save();
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);

                detections.forEach((det, idx) => {
                    const box = det.detection.box;
                    const bx = box.x * scaleX;
                    const by = box.y * scaleY;
                    const bw = box.width  * scaleX;
                    const bh = box.height * scaleY;

                    // Kotak wajah
                    ctx.strokeStyle = "#E2C799";
                    ctx.lineWidth   = 2;
                    ctx.strokeRect(bx, by, bw, bh);

                    // Corner accents
                    const cs = 14;
                    ctx.strokeStyle = "#FFD700";
                    ctx.lineWidth   = 3;
                    [[bx,by],[bx+bw,by],[bx,by+bh],[bx+bw,by+bh]].forEach(([cx,cy]) => {
                        ctx.beginPath(); ctx.moveTo(cx, cy + (cy===by ? cs : -cs)); ctx.lineTo(cx, cy); ctx.lineTo(cx + (cx===bx ? cs : -cs), cy); ctx.stroke();
                    });

                    // Landmark titik
                    const lm = det.landmarks.positions;
                    ctx.fillStyle = "rgba(226,199,153,0.7)";
                    lm.forEach(pt => {
                        ctx.beginPath();
                        ctx.arc(pt.x * scaleX, pt.y * scaleY, 1.2, 0, Math.PI * 2);
                        ctx.fill();
                    });
                });
                ctx.restore();

                // Update status & badges
                const badgesEl = document.getElementById('faceid-badges');
                badgesEl.innerHTML = "";
                let statusText = `${detections.length} wajah terdeteksi`;
                document.getElementById('faceid-status').innerText = statusText;

                detections.forEach((det, idx) => {
                    const gender = det.gender === "male" ? "Pria" : "Wanita";
                    const age    = Math.round(det.age);
                    const exps   = det.expressions;
                    const topExp = Object.entries(exps).sort((a,b) => b[1]-a[1])[0];
                    const expMap = { happy:"Senang", sad:"Sedih", angry:"Marah", fearful:"Takut", disgusted:"Jijik", surprised:"Terkejut", neutral:"Netral" };
                    const expLabel = expMap[topExp[0]] || topExp[0];
                    const badge = document.createElement('div');
                    badge.className = "bg-zinc-900 border border-[#E2C799]/30 rounded-xl px-3 py-1.5 text-center text-[10px] text-[#E2C799] font-semibold tracking-wide";
                    badge.innerHTML = `👤 Wajah ${idx+1}<br><span class='text-white font-bold'>${gender}, ~${age} thn</span><br><span class='text-zinc-400'>${expLabel}</span>`;
                    badgesEl.appendChild(badge);
                });

            }, 350);
        }

        function tutupFaceID() {
            clearInterval(faceIDInterval);
            faceIDInterval = null;

            if (faceIDStream) {
                faceIDStream.getTracks().forEach(t => t.stop());
                faceIDStream = null;
            }

            const video  = document.getElementById('faceid-video');
            const canvas = document.getElementById('faceid-canvas');
            video.srcObject = null;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            document.getElementById('faceid-overlay').classList.add('page-hidden');
            document.getElementById('btn-scan-faceid').classList.remove('btn-faceid-active');
            document.getElementById('faceid-badges').innerHTML = "";
        }
    </script>
</body>
</html>
