<!DOCTYPE html>
<html lang="id" class="w-full h-full m-0 p-0 overflow-hidden select-none touch-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Digital Photobooth</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');
        body { 
            background-color: #0A0A0A; 
            font-family: 'Montserrat', sans-serif; 
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .font-wedding { font-family: 'Cinzel', serif; }
        .page-hidden { display: none !important; }
        
        /* Mengunci video preview agar selalu mirror di kamera depan */
        .mirror-view { transform: scaleX(-1); }
        
        /* Efek Filter Kamera */
        .filter-beauty { filter: contrast(105%) brightness(108%) saturate(102%); }
        .filter-bw { filter: grayscale(100%) contrast(120%); }
        .filter-sepia { filter: sepia(80%) contrast(95%) brightness(102%); }

        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="w-full h-full m-0 p-0 overflow-hidden flex justify-center bg-black">

    <div class="w-full max-w-[480px] h-full bg-[#0A0A0A] relative overflow-hidden flex flex-col justify-between text-white overscroll-none">
        
        <div id="page-sesi-potret" class="flex flex-col justify-between h-full w-full relative z-10 pt-safe pb-safe">
            
            <div class="flex justify-between items-center px-6 pt-5 pb-3 bg-gradient-to-b from-black/80 to-transparent z-30">
                <button onclick="toggleKamera()" class="flex items-center gap-1.5 text-xs font-semibold tracking-wider bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10 active:scale-95 transition">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5 text-[#E5C158]"></i> 
                    <span id="text-kamera">FRONT</span>
                </button>
                <button onclick="toggleFlash()" class="flex items-center gap-1.5 text-xs font-semibold tracking-wider bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10 active:scale-95 transition">
                    <i data-lucide="zap" id="icon-flash" class="w-3.5 h-3.5 text-yellow-400"></i> 
                    <span id="text-flash">AUTO</span>
                </button>
                <button onclick="toggleFilter()" class="flex items-center gap-1.5 text-xs font-semibold tracking-wider bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10 active:scale-95 transition">
                    <i data-lucide="aperture" class="w-3.5 h-3.5 text-cyan-400"></i> 
                    <span id="text-filter">BEAUTY</span>
                </button>
            </div>

            <div class="absolute inset-0 w-full h-full bg-gray-900 z-0">
                <video id="video-potret" class="w-full h-full object-cover mirror-view filter-beauty" autoplay muted playsinline></video>
                
                <div id="flash-overlay" class="absolute inset-0 bg-white opacity-0 pointer-events-none transition-opacity duration-75 z-40"></div>

                <div class="absolute top-20 left-6 bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-full text-xs font-semibold tracking-wide border border-white/10 z-30">
                    📸 Frame: <span id="jumlah-potret" class="text-[#E5C158] font-bold">0</span>/7
                </div>
            </div>

            <div class="flex justify-between items-center px-10 pb-8 pt-10 bg-gradient-to-t from-black/90 via-black/40 to-transparent z-30 w-full">
                <button onclick="pindahHalaman('sesi-potret', 'gallery')" class="w-12 h-12 rounded-2xl bg-white/10 backdrop-blur-md border border-white/20 overflow-hidden flex items-center justify-center active:scale-95 transition group">
                    <i data-lucide="image" class="w-5 h-5 text-gray-300 group-hover:text-white"></i>
                </button>
                
                <button onclick="jepretDanUpload()" class="w-20 h-20 bg-white rounded-full p-1.5 border-4 border-gray-400/40 shadow-2xl active:scale-90 transform transition duration-100 flex items-center justify-center">
                    <div class="w-full h-full bg-white rounded-full border-2 border-gray-300 shadow-inner"></div>
                </button>
                
                <div id="upload-indicator" class="w-12 h-12 flex items-center justify-center text-xs">
                    <i data-lucide="check-circle" class="w-6 h-6 text-green-400 hidden"></i>
                    <i data-lucide="loader-2" class="w-6 h-6 text-yellow-400 animate-spin hidden"></i>
                </div>
            </div>
        </div>

        <div id="page-gallery" class="page-hidden flex flex-col justify-between h-full w-full p-6 z-10 pt-safe pb-safe">
            <div class="flex justify-between items-center border-b border-white/10 pb-4 mt-2">
                <div>
                    <p class="text-[9px] tracking-[0.2em] text-[#E5C158]/80 font-wedding">THE WEDDING OF</p>
                    <h1 class="text-base font-wedding tracking-widest text-[#E5C158] font-bold">Andi & Zaza</h1>
                </div>
                <span class="text-[10px] bg-white/10 border border-white/20 px-3 py-1 rounded-full text-amber-300 font-semibold tracking-wider">RESULT! ✨</span>
            </div>
            
            <div id="gallery-grid" class="grid grid-cols-3 gap-2.5 overflow-y-auto h-full my-4 py-1 px-0.5 custom-scroll">
                </div>
            
            <div class="flex justify-between items-center border-t border-white/10 pt-4 pb-2">
                <button onclick="pindahHalaman('gallery', 'sesi-potret')" class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 hover:text-white transition">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> AMBIL FOTO
                </button>
                <button onclick="pindahHalaman('gallery', 'done-finish')" class="bg-[#8C6A3B] hover:bg-[#A6804E] text-white px-6 py-2.5 rounded-xl text-xs font-bold tracking-widest shadow-lg active:scale-95 transition">
                    SELESAI →
                </button>
            </div>
        </div>

        <div id="page-result-single" class="page-hidden flex flex-col justify-between h-full w-full p-6 z-10 pt-safe pb-safe">
            <div class="mt-2">
                <button onclick="pindahHalaman('result-single', 'gallery')" class="flex items-center gap-1.5 text-xs font-semibold text-gray-400 hover:text-white transition">
                    <i data-lucide="chevron-left" class="w-4 h-4"></i> Kembali ke Galeri
                </button>
            </div>
            
            <div class="w-full h-[65%] bg-[#111] rounded-3xl overflow-hidden border border-white/10 my-4 shadow-2xl flex items-center justify-center">
                <img id="img-single-view" class="w-full h-full object-contain" src="">
            </div>
            
            <div class="pb-2">
                <a id="btn-download" href="#" target="_blank" class="w-full bg-[#8C6A3B] hover:bg-[#A6804E] text-white py-3.5 rounded-xl font-bold text-xs tracking-widest flex items-center justify-center gap-2 shadow-xl active:scale-95 transition">
                    <i data-lucide="download" class="w-4.5 h-4.5"></i> UNDUH FOTO KE HP
                </a>
            </div>
        </div>

        <div id="page-done-finish" class="page-hidden flex flex-col justify-center items-center h-full w-full p-8 text-center z-10 space-y-6 pt-safe pb-safe">
            <div class="w-20 h-20 bg-emerald-500/10 border border-emerald-500/20 rounded-full flex items-center justify-center text-emerald-400 animate-bounce">
                <i data-lucide="heart" class="w-10 h-10 fill-emerald-400"></i>
            </div>
            <div class="space-y-3">
                <h1 class="text-2xl font-wedding tracking-widest text-[#E5C158] font-bold">Andi & Zaza</h1>
                <div class="w-12 h-[1px] bg-[#E5C158]/40 mx-auto my-3"></div>
                <p class="text-xs text-gray-300 leading-relaxed px-6">Terima kasih sudah mengabadikan momen berharga di pernikahan kami. Seluruh foto Anda telah tersimpan aman di dalam sistem galeri cloud.</p>
            </div>
            <button onclick="pindahHalaman('done-finish', 'sesi-potret')" class="border border-white/20 bg-white/5 hover:bg-white/10 text-white px-6 py-3 rounded-xl text-xs font-bold tracking-wider transition active:scale-95">
                Ambil Foto Baru
            </button>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://plcrvnyfhczykdqrjhfs.supabase.co";
        const SUPABASE_KEY = "sb_publishable_vX_mEtYu3d9iq0CiUBuvyQ_r73lyg0B";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let mediaStream = null;
        let countPotret = 0;
        
        // State Konfigurasi Menu Atas Kamera
        let modeFacing = "user"; // "user" = depan, "environment" = belakang
        let modeFlash = "AUTO";  // AUTO, ON, OFF
        let jenisFilter = "BEAUTY"; // BEAUTY, BW, SEPIA

        // Fungsi Memulai Kamera
        async function startKameraOtomatis() {
            lucide.createIcons();
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: modeFacing, 
                        width: { ideal: 1280 }, 
                        height: { ideal: 960 } 
                    } 
                });
                
                const videoElement = document.getElementById('video-potret');
                videoElement.srcObject = mediaStream;

                // Atur mirror efek: Hanya aktif jika menggunakan kamera depan (user)
                if (modeFacing === "user") {
                    videoElement.classList.add('mirror-view');
                } else {
                    videoElement.classList.remove('mirror-view');
                }
            } catch (err) {
                alert("Gagal mengakses kamera. Silakan periksa izin akses browser Anda!");
                console.error(err);
            }
        }
        window.addEventListener('DOMContentLoaded', startKameraOtomatis);

        // 1. FUNGSI UTK SWITCH FRONT / BACK CAMERA
        async function toggleKamera() {
            modeFacing = (modeFacing === "user") ? "environment" : "user";
            document.getElementById('text-kamera').innerText = (modeFacing === "user") ? "FRONT" : "BACK";
            await startKameraOtomatis();
        }

        // 2. FUNGSI UTK SETTING FLASH MODE
        function toggleFlash() {
            const label = document.getElementById('text-flash');
            const icon = document.getElementById('icon-flash');
            
            if (modeFlash === "AUTO") {
                modeFlash = "ON";
                label.innerText = "ON";
                icon.className = "w-3.5 h-3.5 text-orange-400";
            } else if (modeFlash === "ON") {
                modeFlash = "OFF";
                label.innerText = "OFF";
                icon.className = "w-3.5 h-3.5 text-gray-500";
            } else {
                modeFlash = "AUTO";
                label.innerText = "AUTO";
                icon.className = "w-3.5 h-3.5 text-yellow-400";
            }
        }

        // 3. FUNGSI UTK SWITCH FILTER REAL-TIME
        function toggleFilter() {
            const videoElement = document.getElementById('video-potret');
            const label = document.getElementById('text-filter');
            
            videoElement.classList.remove('filter-beauty', 'filter-bw', 'filter-sepia');

            if (jenisFilter === "BEAUTY") {
                jenisFilter = "BW";
                label.innerText = "B&W";
                videoElement.classList.add('filter-bw');
            } else if (jenisFilter === "BW") {
                jenisFilter = "SEPIA";
                label.innerText = "SEPIA";
                videoElement.classList.add('filter-sepia');
            } else {
                jenisFilter = "BEAUTY";
                label.innerText = "BEAUTY";
                videoElement.classList.add('filter-beauty');
            }
        }

        // Penanganan Alur Pindah Halaman
        async function pindahHalaman(dari, ke) {
            document.getElementById(`page-${dari}`).classList.add('page-hidden');
            document.getElementById(`page-${ke}`).classList.remove('page-hidden');

            if(dari === 'sesi-potret' && mediaStream) { 
                mediaStream.getTracks().forEach(track => track.stop()); 
                mediaStream = null;
            }

            if (ke === 'sesi-potret') {
                countPotret = 0;
                document.getElementById('jumlah-potret').innerText = countPotret;
                await startKameraOtomatis();
            } else if (ke === 'gallery') {
                ambilSemuaFotoDariDatabase();
            }
        }

        // Fungsi Ambil Foto & Penyelarasan Mirroring Hasil Akhir
        async function jepretDanUpload() {
            if(countPotret >= 7) { 
                await pindahHalaman('sesi-potret', 'gallery'); 
                return; 
            }
            
            const video = document.getElementById('video-potret');
            const flash = document.getElementById('flash-overlay');
            const loader = document.getElementById('upload-indicator');

            // Cek Aturan Flash Terpilih untuk memicu Blitz Screen
            if (modeFlash === "ON" || modeFlash === "AUTO") {
                flash.classList.remove('opacity-0');
                flash.classList.add('opacity-100');
                setTimeout(() => {
                    flash.classList.remove('opacity-100');
                    flash.classList.add('opacity-0');
                }, 100);
            }

            loader.querySelector('[data-lucide="loader-2"]').classList.remove('hidden');

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            
            // PROSES MIRRORING & FILTER PADA CANVAS (AGAR HASIL SAMA DENGAN LAYAR HP)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            
            if (modeFacing === "user") {
                // Balik canvas jika kamera depan agar hasil foto TIDAK TERBALIK balik
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            
            // Terapkan Filter yang sama ke Canvas
            if (jenisFilter === "BEAUTY") {
                ctx.filter = "contrast(105%) brightness(108%) saturate(102%)";
            } else if (jenisFilter === "BW") {
                ctx.filter = "grayscale(100%) contrast(120%)";
            } else if (jenisFilter === "SEPIA") {
                ctx.filter = "sepia(80%) contrast(95%) brightness(102%)";
            }

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();
            
            canvas.toBlob(async (blob) => {
                if(!blob) return;
                const namaFile = `photo_${Date.now()}_${Math.random().toString(36).substring(5)}.jpg`;
                
                const { data, error } = await supabaseClient.storage.from('galeri-foto').upload(namaFile, blob, { contentType: 'image/jpeg' });
                
                loader.querySelector('[data-lucide="loader-2"]').classList.add('hidden');

                if(error) { 
                    alert("Gagal mengunggah foto: " + error.message); 
                    return; 
                }

                const centang = loader.querySelector('[data-lucide="check-circle"]');
                centang.classList.remove('hidden');
                setTimeout(() => centang.classList.add('hidden'), 1000);

                countPotret++;
                document.getElementById('jumlah-potret').innerText = countPotret;
                
                if(countPotret === 7) { 
                    await pindahHalaman('sesi-potret', 'gallery'); 
                }
            }, 'image/jpeg', 0.9);
        }

        // Render Galeri
        async function ambilSemuaFotoDariDatabase() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = "<div class='text-center col-span-3 py-24 text-xs text-gray-500 animate-pulse'>Memuat galeri...</div>";
            
            const { data: daftarFile, error } = await supabaseClient.storage.from('galeri-foto').list('', {
                limit: 30,
                sortBy: { column: 'created_at', order: 'desc' }
            });

            if(error || !daftarFile || daftarFile.length === 0) { 
                grid.innerHTML = "<div class='text-center col-span-3 py-24 text-xs text-gray-500'>Belum ada foto.</div>"; 
                return; 
            }

            grid.innerHTML = "";
            daftarFile.forEach(file => {
                if(file.name === '.emptyFolderPlaceholder') return;
                const { data } = supabaseClient.storage.from('galeri-foto').getPublicUrl(file.name);
                
                const kotak = document.createElement('div');
                kotak.className = "bg-gray-900 aspect-square rounded-2xl overflow-hidden border border-white/5 active:scale-95 transition shadow-lg";
                kotak.onclick = () => {
                    document.getElementById('img-single-view').src = data.publicUrl;
                    document.getElementById('btn-download').href = data.publicUrl;
                    pindahHalaman('gallery', 'result-single');
                };
                kotak.innerHTML = `<img src="${data.publicUrl}" class="w-full h-full object-cover">`;
                grid.appendChild(kotak);
            });
        }
    </script>
</body>
</html>
