<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Digital Photobooth AI - Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap');

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #050505;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-wedding { font-family: 'Cinzel', serif; }
        .page-hidden { display: none !important; }

        #app {
            width: 100%;
            height: 100dvh;
            background: #050505;
            color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #gallery-grid {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #gallery-grid::-webkit-scrollbar { width: 4px; }
        #gallery-grid::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

        #flash-overlay {
            position: absolute; inset: 0;
            background: white; opacity: 0;
            pointer-events: none; z-index: 99;
            transition: opacity 0.05s ease-out;
        }
        #flash-overlay.flash-on { opacity: 1; }

        .toast {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom) + 100px);
            left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(229, 193, 88, 0.2);
            color: #E5C158; padding: 10px 22px;
            border-radius: 30px; font-size: 11px; font-weight: 500;
            white-space: nowrap; z-index: 9999;
            pointer-events: none; opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.show { opacity: 1; transform: translate(-50%, -5px); }

        @keyframes scanMove {
            0% { top: 5%; opacity: 0.3; }
            50% { top: 90%; opacity: 1; }
            100% { top: 5%; opacity: 0.3; }
        }
        .scan-line {
            position: absolute; left: 0; right: 0; height: 3px;
            background: linear-gradient(to right, transparent, #E5C158, transparent);
            box-shadow: 0 0 12px #E5C158;
            animation: scanMove 2.5s ease-in-out infinite;
        }

        .filter-none { filter: none; }
        .filter-b-w { filter: grayscale(100%) contrast(120%); }
        .filter-vintage { filter: sepia(50%) hue-rotate(-30deg) saturate(140%); }
        .filter-warm { filter: sepia(20%) saturate(130%) contrast(110%); }
    </style>
</head>
<body>
<div id="app">

    <div id="flash-overlay"></div>

    <div id="toast" class="toast"></div>

    <div id="page-registrasi" class="flex flex-col justify-between h-full z-10 px-6">
        <div class="text-center mt-20 space-y-3">
            <p class="text-[10px] tracking-[0.4em] text-[#E5C158]/60 font-wedding uppercase">Digital Premium Photobooth</p>
            <h1 class="text-3xl font-wedding tracking-widest text-[#E5C158] font-semibold">The Celebration</h1>
            <div class="w-16 h-px bg-[#E5C158]/30 mx-auto mt-4"></div>
        </div>

        <div class="space-y-5 max-w-sm mx-auto w-full">
            <div class="bg-[#111] p-6 rounded-2xl border border-white/5 space-y-4 shadow-xl">
                <div class="space-y-1.5">
                    <label class="block text-[9px] text-gray-400 tracking-wider uppercase font-semibold">Nama Lengkap</label>
                    <input type="text" id="reg-nama"
                        class="w-full bg-[#1A1A1A] text-white border border-white/10 rounded-xl py-3 px-4
